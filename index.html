<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鬼鴞說資料 · 資料／AI Podcast 知識庫</title>
<meta name="description" content="《鬼鴞說資料》Podcast 知識庫：21 集逐集主題切段、故事線、人物、詞彙與逐字稿全站搜尋。">
<script>
/* theme init (avoid flash): default dark = the owl's night */
(function(){try{var t=localStorage.getItem('gx-theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
<style>
:root{
  /* dark = primary mood: a night for the owl */
  --bg:#0E1015; --bg2:#141826; --surface:#191F2E; --surface2:#212a3e;
  --border:#2A3450; --border-soft:#212a40; --text:#E9EBF0; --dim:#99A2B8; --dimmer:#6c768f;
  --eye:#E6A93C; --eye-soft:#352a14; --eye-line:#5a4a22;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.34);
  --t-founding:#D69A45; --t-community:#54A8A0; --t-product:#8090DE; --t-external:#CB85B6; --t-people:#9BBE5C;
  --a-transform:#E6A93C; --a-method:#54A8A0; --a-product:#8090DE; --a-ecosystem:#CB85B6;
  --mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono","Noto Sans Mono",monospace;
  --sans:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  --rad:14px; --rad-s:9px; --maxw:1180px;
}
html[data-theme="light"]{
  --bg:#F5F3EC; --bg2:#FFFFFF; --surface:#FFFFFF; --surface2:#F1EEE5;
  --border:#E2DDD0; --border-soft:#ECE8DC; --text:#1B2026;
  --dim:#5C6472; --dimmer:#8a8f9c;
  --eye:#A86E14; --eye-soft:#F4E9CF; --eye-line:#E3D2A6;
  --shadow:0 1px 2px rgba(60,50,20,.06),0 10px 30px rgba(60,50,20,.08);
  --t-founding:#B5781F; --t-community:#318079; --t-product:#5566C2; --t-external:#A8528C; --t-people:#6E8E33;
  --a-transform:#B5781F; --a-method:#318079; --a-product:#5566C2; --a-ecosystem:#A8528C;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(900px 380px at 84% -8%, var(--eye-soft) 0%, transparent 60%),
    var(--bg);
  color:var(--text); font-family:var(--sans);
  font-size:15.5px; line-height:1.66; -webkit-font-smoothing:antialiased;
  letter-spacing:.005em;
}
html[data-theme="light"] body{background:radial-gradient(900px 420px at 86% -10%, var(--eye-soft) 0%, transparent 55%),var(--bg);}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--eye);color:#1a1306}

/* ---------- header ---------- */
.top{position:sticky;top:0;z-index:40;backdrop-filter:saturate(140%) blur(10px);
  background:color-mix(in srgb,var(--bg) 82%, transparent);
  border-bottom:1px solid var(--border-soft);}
.top-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:14px;
  padding:11px 20px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex:0 0 auto;}
.brand .eyes{width:30px;height:30px;flex:0 0 auto}
.brand .nm{font-weight:800;letter-spacing:-.01em;font-size:17px;white-space:nowrap}
.brand .nm small{display:block;font-weight:500;font-size:10.5px;letter-spacing:.18em;color:var(--dim);
  font-family:var(--mono);text-transform:uppercase;margin-top:-2px}
nav.tabs{display:flex;gap:2px;flex:1 1 auto;overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{appearance:none;background:none;border:none;color:var(--dim);font-size:14.5px;font-weight:600;
  padding:8px 13px;border-radius:999px;white-space:nowrap;position:relative;transition:color .18s,background .18s}
.tab:hover{color:var(--text)}
.tab[aria-current="true"]{color:var(--text);background:var(--surface2)}
.tab[aria-current="true"]::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;background:var(--eye)}
.tools{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.search-open,.theme-btn{appearance:none;border:1px solid var(--border);background:var(--surface);
  color:var(--text);height:38px;border-radius:999px;display:flex;align-items:center;gap:8px;
  padding:0 14px;font-size:13.5px;transition:border-color .18s,transform .12s}
.search-open:hover,.theme-btn:hover{border-color:var(--eye)}
.search-open .k{font-family:var(--mono);color:var(--dimmer);font-size:11px;border:1px solid var(--border);
  border-radius:5px;padding:1px 5px;margin-left:2px}
.theme-btn{width:38px;justify-content:center;padding:0}
.theme-btn svg{width:17px;height:17px}
@media(max-width:560px){.search-open .lbl,.search-open .k{display:none}.search-open{width:38px;justify-content:center;padding:0}}

/* ---------- layout ---------- */
main{max-width:var(--maxw);margin:0 auto;padding:26px 20px 80px}
.view{animation:rise .4s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vhead{margin:2px 0 18px}
.vhead h1{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
.vhead p{margin:0;color:var(--dim);font-size:14px;max-width:62ch}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--eye);font-weight:600;margin-bottom:7px}

/* chips / filters */
.filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:18px}
.chip{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--dim);
  border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:600;display:inline-flex;
  align-items:center;gap:7px;transition:all .15s;line-height:1.4}
.chip:hover{color:var(--text);border-color:var(--dimmer)}
.chip[aria-pressed="true"]{color:var(--text);border-color:transparent;background:var(--surface2)}
.chip .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.chip.on-type[aria-pressed="true"]{box-shadow:inset 0 0 0 1.5px var(--c)}
.chip.tag[aria-pressed="true"]{background:var(--eye-soft);box-shadow:inset 0 0 0 1.5px var(--eye-line);color:var(--text)}
.filters .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.filters .clr{color:var(--dimmer);font-size:12px;border:none;background:none;padding:5px 6px}
.filters .clr:hover{color:var(--eye);text-decoration:underline}
.muted-count{color:var(--dimmer);font-size:12.5px;font-family:var(--mono)}

/* ---------- episodes split ---------- */
.split{display:grid;grid-template-columns:330px 1fr;gap:24px;align-items:start}
@media(max-width:860px){.split{grid-template-columns:1fr}.eplist.hide-m{display:none}.epdetail.hide-m{display:none}}
.eplist{display:flex;flex-direction:column;gap:8px;position:sticky;top:74px;max-height:calc(100vh - 96px);
  overflow:auto;padding-right:4px;scrollbar-width:thin}
.epcard{text-align:left;appearance:none;background:var(--surface);border:1px solid var(--border-soft);
  border-left:3px solid var(--c,var(--border));border-radius:var(--rad-s);padding:11px 13px;
  display:block;width:100%;transition:transform .12s,border-color .15s,background .15s}
.epcard:hover{transform:translateX(2px);border-color:var(--border)}
.epcard[aria-current="true"]{background:var(--surface2);border-color:var(--c,var(--eye))}
.epcard .r1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.epcard .no{font-family:var(--mono);font-size:11px;color:var(--c,var(--eye));font-weight:700;letter-spacing:.04em}
.epcard .ty{font-size:10.5px;color:var(--dim)}
.epcard .ti{font-size:13.5px;font-weight:600;line-height:1.4}
.epcard .gs{font-size:11.5px;color:var(--dimmer);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* detail */
.epdetail{min-width:0}
.back-m{display:none}
@media(max-width:860px){.back-m{display:inline-flex;margin-bottom:12px}}
.det-head{border-bottom:1px solid var(--border-soft);padding-bottom:16px;margin-bottom:18px}
.det-head .r1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.det-head .no{font-family:var(--mono);font-weight:700;color:var(--c,var(--eye));font-size:13px}
.badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;color:#0e0e0e;background:var(--c,var(--eye))}
html[data-theme="dark"] .badge{color:#0e1015}
.series{font-size:11.5px;color:var(--dim);border:1px dashed var(--border);border-radius:999px;padding:2px 9px}
.det-head h2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 10px;line-height:1.25}
.cast{font-size:13.5px;color:var(--dim)}
.cast b{color:var(--text);font-weight:700}
.cast .host::before{content:"主持 ";color:var(--dimmer);font-size:11px}
.cast .gst{color:var(--text)}
.cast .role{color:var(--dim)}

.sec{margin:22px 0}
.sec > h3{font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--dim);margin:0 0 12px;
  display:flex;align-items:center;gap:9px}
.sec > h3::before{content:"";width:14px;height:2px;background:var(--eye);border-radius:2px}

.keys{display:grid;gap:9px}
.key{display:flex;gap:11px;background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad-s);padding:11px 13px}
.key .n{font-family:var(--mono);color:var(--eye);font-weight:700;font-size:13px;flex:0 0 auto}
.key .t{font-size:14px}

.segs{display:grid;gap:10px}
.seg{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad-s);
  padding:13px 15px;transition:border-color .15s}
.seg:hover{border-color:var(--border)}
.seg .sl{font-weight:700;font-size:14.5px;margin-bottom:5px;letter-spacing:-.005em}
.seg .sl .i{font-family:var(--mono);color:var(--dimmer);font-size:11px;margin-right:8px;font-weight:600}
.seg .ss{color:var(--text);font-size:13.7px;line-height:1.62}
.seg .st{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
.tg{font-size:11px;font-family:var(--mono);color:var(--dim);background:var(--bg2);border:1px solid var(--border-soft);
  border-radius:6px;padding:1px 7px;cursor:pointer;transition:color .15s,border-color .15s}
.tg:hover{color:var(--eye);border-color:var(--eye-line)}

.quotes{display:flex;flex-direction:column;gap:7px}
.quote{border-left:3px solid var(--eye);background:var(--eye-soft);border-radius:0 8px 8px 0;
  padding:8px 13px;font-size:13.7px;color:var(--text)}
html[data-theme="light"] .quote{background:var(--eye-soft)}
.quote::before{content:"「";color:var(--eye);font-weight:700}
.quote::after{content:"」";color:var(--eye);font-weight:700}

.rel{display:flex;flex-wrap:wrap;gap:8px}
.rel a{font-family:var(--mono);font-size:12px;font-weight:700;text-decoration:none;color:var(--eye);
  border:1px solid var(--eye-line);border-radius:8px;padding:4px 10px;transition:background .15s}
.rel a:hover{background:var(--eye-soft)}

/* transcript */
.tx{border:1px solid var(--border);border-radius:var(--rad-s);overflow:hidden}
.tx-btn{width:100%;text-align:left;background:var(--surface2);border:none;color:var(--text);
  padding:12px 15px;display:flex;align-items:center;justify-content:space-between;font-size:13.5px;font-weight:700}
.tx-btn .hint{color:var(--dimmer);font-weight:500;font-size:12px;font-family:var(--mono)}
.tx-btn .car{transition:transform .2s;color:var(--dim)}
.tx[open] .tx-btn .car{transform:rotate(90deg)}
.tx-body{padding:14px 16px;border-top:1px solid var(--border-soft);max-height:62vh;overflow:auto;
  white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.85;color:var(--text);scrollbar-width:thin}
.tx-body .st{color:var(--dimmer)}
.tx-note{color:var(--dim);font-size:12.5px}
mark{background:var(--eye);color:#1a1306;border-radius:3px;padding:0 1px}

/* ---------- timeline ---------- */
.tl{position:relative;margin-top:6px;padding-left:8px}
.tl::before{content:"";position:absolute;left:96px;top:6px;bottom:6px;width:2px;background:var(--border)}
@media(max-width:680px){.tl::before{left:12px}}
.tlrow{position:relative;display:grid;grid-template-columns:84px 1fr;gap:22px;padding:9px 0;align-items:start}
@media(max-width:680px){.tlrow{grid-template-columns:1fr;padding-left:34px}}
.tlrow .yr{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--text);text-align:right;padding-top:13px}
@media(max-width:680px){.tlrow .yr{text-align:left;color:var(--dim);padding-top:0;margin-bottom:5px}}
.tlrow .node{position:absolute;left:91px;top:16px;width:11px;height:11px;border-radius:50%;
  background:var(--c,var(--eye));border:2px solid var(--bg);z-index:2}
@media(max-width:680px){.tlrow .node{left:7px;top:4px}}
.tlcard{background:var(--surface);border:1px solid var(--border-soft);border-left:3px solid var(--c,var(--eye));
  border-radius:var(--rad-s);padding:11px 14px}
.tlcard .ev{font-size:14px}
.tlcard .mt{margin-top:7px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.arc-pill{font-size:11px;font-weight:700;color:var(--c,var(--eye));border:1px solid var(--c,var(--eye));
  border-radius:999px;padding:1px 9px;opacity:.92}
.srcs{display:flex;gap:5px;flex-wrap:wrap}
.srcs a{font-family:var(--mono);font-size:11px;color:var(--dim);text-decoration:none;border:1px solid var(--border-soft);
  border-radius:6px;padding:0 6px}
.srcs a:hover{color:var(--eye);border-color:var(--eye-line)}
.arc-legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}

/* ---------- roles ---------- */
.rolesec{margin-bottom:30px}
.rolesec h2{font-size:16px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:9px}
.rolesec .sub{color:var(--dim);font-size:13px;margin:0 0 14px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.rcard{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad);padding:14px 16px;
  transition:border-color .15s,transform .12s}
.rcard:hover{border-color:var(--border);transform:translateY(-2px)}
.rcard .nm{font-size:15.5px;font-weight:800;letter-spacing:-.01em}
.rcard .ti{color:var(--eye);font-size:12.5px;font-weight:700;margin-top:2px}
.rcard .org{color:var(--dim);font-size:12px;margin-top:1px}
.rcard .dt{color:var(--text);font-size:12.7px;margin-top:9px;line-height:1.6;border-top:1px dashed var(--border-soft);padding-top:9px}
.rcard .cm{color:var(--dim);font-size:12px;margin-top:7px}
.rcard .cm b{color:var(--text);font-weight:700}
.rcard .ap{margin-top:9px;display:flex;gap:5px;flex-wrap:wrap}
.rcard .ap a{font-family:var(--mono);font-size:10.5px;color:var(--dim);text-decoration:none;
  border:1px solid var(--border-soft);border-radius:5px;padding:0 5px}
.rcard .ap a:hover{color:var(--eye);border-color:var(--eye-line)}

/* org chart (3 layers) */
.org-note{color:var(--dim);font-size:13px;margin:0 0 10px;max-width:74ch;line-height:1.65}
.org-correction{font-size:12.5px;color:var(--text);background:var(--eye-soft);border:1px solid var(--eye-line);border-radius:var(--rad-s);padding:9px 13px;margin:0 0 18px;line-height:1.6}
.org-apex{display:flex;justify-content:center;margin-bottom:4px}
.apex-node{background:linear-gradient(180deg,var(--eye-soft),var(--surface) 80%);border:1.5px solid var(--eye);border-radius:12px;padding:9px 18px;text-align:center}
.apex-node .an{font-weight:800;font-size:15px}
.apex-node .at{font-size:11px;color:var(--eye);font-weight:700;margin-top:1px}
.org-stem{width:2px;height:18px;background:var(--border);margin:0 auto}
.org3{display:flex;flex-direction:column;gap:14px}
.olayer{border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;--lc:var(--eye)}
.olayer.l-hacom{--lc:var(--a-transform)} .olayer.l-projecting{--lc:var(--a-product)} .olayer.l-communities{--lc:var(--a-method)}
.olayer-h{display:flex;flex-wrap:wrap;align-items:baseline;gap:9px;padding:11px 15px;background:var(--surface2);border-left:4px solid var(--lc)}
.olayer-h .ln{font-weight:800;font-size:15px;letter-spacing:-.01em}
.olayer-h .le{font-family:var(--mono);font-size:10.5px;color:var(--dimmer);letter-spacing:.04em}
.olayer-h .lk{font-size:10.5px;font-weight:700;color:var(--lc);border:1px solid var(--lc);border-radius:999px;padding:0 8px}
.olayer-h .ld{flex-basis:100%;font-size:12px;color:var(--dim);line-height:1.55;margin-top:3px}
.olayer-b{padding:14px 15px;display:flex;flex-direction:column;gap:12px}
.hacom-grid{display:grid;grid-template-columns:0.85fr 2fr;gap:12px;align-items:start}
@media(max-width:760px){.hacom-grid{grid-template-columns:1fr}}
.unitbox{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad-s);padding:11px 13px;border-top:3px solid var(--lc)}
.unitbox .ut{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.unitbox .utag{font-size:10px;font-family:var(--mono);color:var(--dimmer);border:1px solid var(--border-soft);border-radius:999px;padding:0 6px}
.unitbox .ufn{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.unitbox .ufn span{font-size:11px;color:var(--dim);background:var(--bg2);border:1px solid var(--border-soft);border-radius:6px;padding:1px 7px}
.bu-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.ppl{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.pchip{display:inline-flex;align-items:baseline;gap:5px;background:var(--bg2);border:1px solid var(--border-soft);border-radius:999px;
  padding:3px 10px;font-size:12px;font-weight:700;text-decoration:none;color:var(--text);transition:border-color .15s,transform .1s}
.pchip:hover{border-color:var(--lc);transform:translateY(-1px)}
.pchip small{font-weight:500;font-size:10px;color:var(--dim)}
.ppl-empty{font-size:11.5px;color:var(--dimmer);font-style:normal}
.proj-band{display:flex;flex-direction:column;gap:9px}
.proj-band .pb-label{font-size:11.5px;font-family:var(--mono);color:var(--lc);font-weight:700;letter-spacing:.05em}
.comm-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.commcard{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad-s);padding:11px 13px;border-top:3px solid var(--lc)}
.commcard .cn{font-weight:800;font-size:13px}
.commcard .cc{font-size:10.5px;color:var(--dim);margin-top:3px;line-height:1.45}

/* episode date */
.epdate,.det-date{font-family:var(--mono);color:var(--dimmer);font-size:11px}
.det-date{font-size:12px;color:var(--dim);margin-left:2px}
.epcard .epdate{margin-left:auto}

/* calendar */
.cal-summary{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;color:var(--dim);font-size:13px}
.cal-summary .pill{font-family:var(--mono);font-size:11.5px;color:var(--text);background:var(--surface);border:1px solid var(--border-soft);border-radius:999px;padding:3px 11px}
.cal-empty{background:var(--surface);border:1px dashed var(--border);border-radius:var(--rad);padding:26px 18px;text-align:center;color:var(--dim);font-size:13.5px;line-height:1.7}
.cal-empty code{font-family:var(--mono);background:var(--bg2);border:1px solid var(--border-soft);border-radius:5px;padding:1px 5px;font-size:12px}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.cal-month{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad);padding:13px 14px}
.cal-month h3{font-size:14px;font-weight:800;margin:0 0 10px;display:flex;align-items:baseline;gap:8px}
.cal-month h3 .cm-n{font-family:var(--mono);font-size:11px;color:var(--dimmer);font-weight:600}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow span{text-align:center;font-size:10px;color:var(--dimmer);font-family:var(--mono)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dimmer);position:relative}
.cal-day.pad{visibility:hidden}

.cal-day a .cd-d{font-size:10px;color:var(--dim);line-height:1}

/* ---------- glossary ---------- */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:12px}
.gcard{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rad);padding:13px 15px;
  transition:border-color .15s,transform .12s}
.gcard:hover{border-color:var(--border);transform:translateY(-2px)}
.gcard.core{border-color:var(--eye-line);background:linear-gradient(180deg,var(--eye-soft),var(--surface) 70%)}
.gcard .gt{font-size:14.5px;font-weight:800;letter-spacing:-.01em;display:flex;gap:6px;align-items:baseline}
.gcard .gt .star{color:var(--eye);font-size:12px}

/* ---------- about ---------- */
.about{max-width:760px}

footer{max-width:var(--maxw);margin:0 auto;padding:22px 20px 40px;color:var(--dimmer);font-size:12px;border-top:1px solid var(--border-soft)}

":"資料專案三部曲","host":"Anna","guests":[{"name":"Alston","role":"DE 兼 Data Infra"},{"name":"Ted","role":"DE 兼 Data Infra"},{"name":"John","role":"DE 兼 DA"},{"name":"Kim","role":"DE 兼 DA"}],"keyPoints":["角色多、跨域多有多崩潰","Data Infra/Data Analysis 的有趣與崩潰","管線窗口不懂產生邏輯,AI 是新時代 UI?"],"segments":[{"label":"三種角色定義","summary":"DA(挖金礦找洞見/Dashboard)、DE(ETL/ELT 前處理清洗)、Data Infra Engineer(蓋可靠可擴展的 data platform)。","tags":["#資料工程"]},{"label":"為何沒有 Data Scientist","summary":"炬識嚴格界定:DS 須交付演算法;他們多用 OpenAI API/開源模型或與 DS 團隊合作。","tags":["#組織"]},{"label":"Data Infra 崩潰:環境不一致","summary":"開發/測試/正式三環境難一致;正式環境上各種鎖(去識別/遮蔽)、量體不同,正式問題無法復現。","tags":["#資料工程"]},{"label":"分散式 + K8s 的痛","summary":"元件溝通、support matrix 版本相配、開源整合、權限管控層層疊加;客戶又常指定不准太新/太舊版本。","tags":["#資料工程"]},{"label":"資料分析:Open Data 的限制","summary":"政府資料多為二三手整合後資料,反映了發布者觀點/bias,難反解 insight(離婚潮分析之例)。","tags":["#資料治理"]},{"label":"參數調到 0 的災難","summary":"購物籃分析參數調 0 = include 所有可能,吃光運算資源拖垮全企業管線;客戶需教育訓練。","tags":["#資料工程"]},{"label":"資料管線:爬蟲易碎","summary":"5–10 隻常用、逾 30 個來源網站;對方改個元素位置爬蟲就死,月月要修。","tags":["#資料工程"]},{"label":"AI 應用:追逐熱門關鍵字","summary":"客戶以為要做 A,其實要做 G,還兜了網路看到的 B、C;潮流先觀察再出手。","tags":["#AI"]},{"label":"AI 是新時代的 UI","summary":"LLM 直接把自然語言轉成 API 呼叫,取代傳統 UI 設計;UI/UX 不會消失但會轉向(下拉→拖拉拽→chat→擴增實境)。","tags":["#AI"]},{"label":"公司策略:敏捷思維 + 長期主義","summary":"為對抗高不確定性、深耕特定客戶,三年前放掉製造業客戶。","tags":["#組織"]}],"metaphors":["石化工業(挖油=DE/煉油平台=Infra/煉成 92 95 汽油=DA)","data scientist 是「最性感的工作」背後是一堆崩潰","一條龍工程師"],"links":[1,2,4,5],"date":null,"transcriptFile":"EP03.txt"},{"id":4,"title":"MAD Landscape 2024:為機器學習、AI 與資料瘋狂","type":"founding","arc":null,"host":"Anna","guests":[{"name":"Jim","role":"資料方案架構師暨產品經理"},{"name":"Asa","role":"資料方案架構師暨技術顧問"}],"keyPoints":["矽谷年發 MAD Landscape,台灣少人提","從市場分析師角度看熱門/新興領域","未來兩年 Data & AI 的變化"],"segments":[{"label":"找生態位 / MAD 由來","summary":"2020–21 炬識 pivot,靠 Matt Turck 的 Landscape 定位;Big Data(2012, 35 子領域)→ ML/AI/Data(2024, 7 領域、逾 100 子領域、數百家公司)。","tags":["#市場"]},{"label":"資料倉儲現況","summary":"關聯式 → Exadata/Netezza/Teradata/SAP HANA(常配硬體 Appliance)→ 雲原生 Redshift/BigQuery/Synapse/Snowflake;台灣大企業普及率不如想像。","tags":["#資料工程"]},{"label":"Data Lake / Lakehouse","summary":"Hadoop 因應非結構化而生;「Hadoop 已死」? Jim 反對—用途未定/反覆試錯場景仍需要;MPP vs 開源各有優劣。","tags":["#資料工程"]},{"label":"Data Integration 演進","summary":"ETL→ELT→Data Integration(閉源,Informatica/SSIS,強調 Enterprise Ready)→ Data Pipeline(開源,強調自由度)→ Data Hub(2023, 強調全企業即時暢通);Salesforce 收購 Informatica。","tags":["#資料工程"]},{"label":"Data Governance 崛起","summary":"治理理論逾 20 年,因 LLM/自動決策再起;荷蘭政府社福模型歧視被告之例—不見棺材不掉淚。","tags":["#資料治理"]},{"label":"專家工具 vs 非專家工具","summary":"判準:界面操作一致性、記憶負擔;治理產品市場分歧,使用者多非工程師(需 business insight 定標準)。","tags":["#資料治理"]},{"label":"AI 與 BI 是同一議題","summary":"兩者都為服務人類、降低領域知識門檻;低/無代碼、嵌入 LLM/RAG;向智老師(BI 前輩)早在 2022 底用 GPT 做立體報表(預測櫻花前線)。","tags":["#AI"]},{"label":"報表只是一種觀點","summary":"Tableau/Grafana/Power BI 呈現的是製作者視角,不等於事實(像股市老師)。","tags":["#資料治理"]},{"label":"炬識選後端/上游賽道","summary":"前端技術更迭如時速 300 的高速公路太可怕,選偏 Data Engineering 的上游題目。","tags":["#市場"]},{"label":"未來兩年:AI 商用點燃資料需求","summary":"顧問公司大賺(Accenture、IBM Consulting Advantage 內嵌 Watson,顧問效率 +50%);AI 是顧問業強心針。","tags":["#市場"]}],"metaphors":["倉儲=共享中央廚房/雲端廚房","治理=誰打掃廚房","德國無限速高速公路(前端)","齒輪恰如其分嵌入市場"],"links":[6,9,17],"date":null,"transcriptFile":"EP04.txt"},{"id":5,"title":"金融業 Data & AI 專案成功法則","type":"founding","arc":null,"host":"Anna","guests":[{"name":"Carey","role":"資料團隊主管"},{"name":"Alston","role":"資料團隊主管"},{"name":"Icy","role":"業務主管"}],"keyPoints":["金融業如何讓 Data & AI 專案成功","金融業是 Data & AI 領頭羊?常見類型與效益","面對高變異性如何應對"],"segments":[{"label":"為何主攻金融業","summary":"Anna 資安背景累積金融客戶;金融商品虛擬、客數多、全球化競爭使銀行焦慮(國泰世華/台北富邦/中國信託衝很快)。","tags":["#市場"]},{"label":"常見專案類型","summary":"① Airflow 管線排程(=機場塔台管制資料流)② 資料倉儲(station 分層/淨水概念)③ 文本摘要決策輔助(串 ChatGPT)④ 客製化推播(精準行銷)⑤ 反洗錢(rule-based→data-driven,ML 模型免改 AP)。","tags":["#資料工程","#AI"]},{"label":"台灣落後矽谷 1–2 年","summary":"IT 落後 5–10 年,但 Data & AI 僅 1–2 年;資料專案求的是客戶「體驗」、是降本增效,不只基礎建設。","tags":["#市場"]},{"label":"客戶 A:資源匱乏的中型銀行","summary":"巧婦難為無米之炊;靠每日 daily meeting 高頻溝通拉近現實與想像、消除認知差。","tags":["#資料專案"]},{"label":"80/20 法則","summary":"交付 80% 標準化 + 留 20% 客製彈性,讓客戶能學習、再生產自己的管線。","tags":["#方法論"]},{"label":"規格 >> 開發","summary":"搞規格時間遠超開發;加上 Copilot 後比例可能拉到 10:1;估價失準=做一個賠一個,改走 team sprint。","tags":["#方法論"]},{"label":"客戶 B:大型金控的 One Team","summary":"有「服務檯」需求自己上門;每日晨會 + LINE 群即時回報;甲乙方互相補位。","tags":["#組織"]},{"label":"One Team 的根基:信任 + 企業文化","summary":"分甲方乙方就永遠是「甲方爸爸/爺爺」;另一大型金控做不起來。","tags":["#組織"]},{"label":"梳理三重 Ops","summary":"DevOps/DataOps/MLOps 三管線絞成一團;Austin(DevOps 社群領袖)+ Jim 花 6 週、約 70–80 team-hours 盤點。","tags":["#組織"]},{"label":"Role 概念 / 結論","summary":"一人多角(Austin 是主管也是社群領袖);LLM 年代,把需求說清楚、引導別人說清楚是稀缺能耐。","tags":["#組織"]}],"metaphors":["私廚 vs 便利商店","資料流=繁忙機場","倉儲=淨水場分層","毛毛蟲不必先想蝴蝶","煉丹(規格書)"],"links":[1,2,8,11,20],"date":null,"transcriptFile":"EP05.txt"},{"id":6,"title":"台灣資料管理協會 Taiwan DAMA 即將成立","type":"community","arc":null,"host":"Anna","guests":[{"name":"Angie","role":"行銷長"},{"name":"Damon","role":"廖麗寬,線性成長數位 CEO"}],"keyPoints":["AI 時代資料治理至關重要,為何成立","進度到哪","各產業資料品質與治理現況"],"segments":[{"label":"緣由:需要國際標準","summary":"以 ISO 27001 類比—有框架/證照,推動才會快;否則各說各話、難協作。","tags":["#資料治理"]},{"label":"為何選 DAMA","summary":"比較 Gartner/CMMI/DCAM/Stanford,選歷史最久、操作性最佳、商業氣息最低的 DAMA;ISO 8000 偏資料品質。","tags":["#資料治理"]},{"label":"管理 vs 治理","summary":"DAMA 名為「管理」實推「治理」—把管理做到極致即治理;治理=綜合計劃+成果,operation=管理活動。","tags":["#資料治理"]},{"label":"進度與時程","summary":"發起人名冊簽署中、FB 粉專已成立;目標年底前掛牌(志工性質故延後);需 30 位發起人,4 位核心工作小組。","tags":["#社群"]},{"label":"DAMA International 沿革","summary":"1980 LA 成立(伴隨資料倉儲);DMBOK(2009 一版、2017 二版);全球三四十個 chapter,以城市為單位。","tags":["#資料治理"]},{"label":"生成式 AI 是推力","summary":"AI 靠有品質的資料練出來,讓 Data Quality 變主旋律。","tags":["#AI"]},{"label":"CDMP 證照","summary":"四級(Associate/Practitioner/Master/Fellow);ESL 版 110 分鐘、附無限模擬題、可用網頁翻譯;每年要提交持續從業聲明 + 簽資料道德規範。","tags":["#資料治理"]},{"label":"核心小組緣起","summary":"Karen 介紹 Damon;Angie 曾辦台灣資料工程協會(2017,單場 700 人);Damon 辦 Airflow/dbt meetup 800 人次。","tags":["#社群"]},{"label":"長期願景:資料資產化","summary":"推產業別資料品質標準→國家標準(CNS)→資料交易所;data source→data asset(需 data catalog)→data capital;需十年。","tags":["#市場"]}],"metaphors":["ISO 27001 之於資安","DMBOK 隨便一句直擊心靈","資料如動產/不動產但易複製","自己提水→自建淨水場"],"links":[4,7,18],"date":null,"transcriptFile":"EP06.txt"},{"id":7,"title":"台灣資料社群系列:專訪 Taipei dbt Meetup","type":"community","arc":null,"host":"Anna","guests":[{"name":"Damon","role":"線性成長數位 CEO"},{"name":"Laurence","role":"REPLWARE CEO"},{"name":"Karen","role":"Recce PM"}],"keyPoints":["dbt 是什麼、Taipei dbt meetup 如何成立","經營 meetup 秘訣","如何加入"],"segments":[{"label":"dbt 是什麼","summary":"以 SQL 為基底的開源資料轉換工具,遵守軟體工程原則(版控/測試/模組化),讓 transformation 可靠高效。","tags":["#資料工程"]},{"label":"成立背景","summary":"Karen 2020 因 Excel 跑廣告資料太慢轉用 SQL/dbt;2022/1 在 dbt slack 申請 local Taipei channel;dbt 源自 Fishtown Analytics(2016)→ dbt Labs;MDS 浪潮使 transformation 重要。","tags":["#社群"]},{"label":"動機透明:為自己也為別人","summary":"Karen 想交流學習、Laurence 想教人找客戶、Alan 想第一手知道別人應用;不另開 Line/FB,鼓勵直接加入國際 dbt slack。","tags":["#社群"]},{"label":"從線上到實體","summary":"2022/8 第一場實體、第五場 meetup;被 dbt Labs 納為官方社區;local channel ~294 人、meetup 上千人;已辦 31 場。","tags":["#社群"]},{"label":"挖素人講者","summary":"逾半講者首次上台、多在交流時間挖到(資料診所「掛號問診」、dbt guide);鼓勵後自發投鐵人賽(六人全完賽)。","tags":["#社群"]},{"label":"Damon 的 dbt 實戰","summary":"大規模專案(數百位資料使用者)的技術債;dbt 建 metadata、資料血緣、讓分析師/PM 也能貢獻 spec;「什麼都變成 code」勝過滑鼠點選。","tags":["#資料工程"]},{"label":"經營秘訣(Laurence)","summary":"台灣缺 networking 文化—職涯第二曲線需要它;成功因素:①提供 networking 場域 ②成員多元(三創辦人 DE/PM/顧問;主題 DE/DA/DS + Business&Data)③主動挖素人講者 ④應用優先(非原理優先)。","tags":["#社群"]},{"label":"能見度文化(東西差異)","summary":"西方從小選舉/簡報,能見度=你的責任;台灣社群經營近年較辛苦,需換方式注入生命力。","tags":["#市場"]}],"metaphors":["資料診所掛號問診","中央極限定理開場會「碎成一片」","沒能見度是你的問題"],"links":[6,8,13],"date":null,"transcriptFile":"EP07.txt"},{"id":8,"title":"專訪內部社群:AM Project Manager","type":"community","arc":null,"host":"Anna","guests":[{"name":"Carey","role":"PM & BU Head,社群理事"},{"name":"Lumi","role":"PM,2024H2 理事長"},{"name":"Mitch","role":"PM,2025 理事長"}],"keyPoints":["AM PM 社群在做什麼","社群活動/產出與公司營運的關係","成功資料專案的心法、2025 計畫"],"segments":[{"label":"炬識三種組織","summary":"①企業組織(行政/BU)②專案組織 ③學習型內部社群;同一人在不同維度有不同 leadership(AI 時代唯 leadership 不被取代)。","tags":["#組織"]},{"label":"社群章程與任務","summary":"兩宗旨(PM 友善交流環境、提升 PM 能力);三任務(教育訓練、議題研究/應用、內外社群合作);與公司營運接軌。","tags":["#社群"]},{"label":"學習預算放社群","summary":"解決傳統把預算放 BU/HR 導致偏斜、碎片化問題;學習需要夥伴(像一群人陪跑馬拉松)。","tags":["#組織"]},{"label":"對外連結","summary":"派員潛入 Asia Summit 2024、PM 人生 meetup,尚未以社群名義對外。","tags":["#社群"]},{"label":"Project Unicode(Biz 2.0)","summary":"unify+code:統一命名原則 + 專案名稱產生器;炬識近十年逾 400 專案,跨 Jira/Slack/Google 命名不一致;由 PM 社群「共識決」產出、拘束全公司對外專案。","tags":["#方法論"]},{"label":"共識決 vs 首長制","summary":"社群走委員會制/共識決,規範由執行者塑造,推行更 smooth(設計者=執行者)。","tags":["#組織"]},{"label":"CEO 也是 PM","summary":"公司 business plan 是最大專案,用今年預算產生財報結果。","tags":["#組織"]},{"label":"成功心法一:利害關係人","summary":"Data Owner/User/資安常非同群、有愛恨糾葛;PMBOK 晚期才加入利害關係人管理;現代專案跨部門化使其不再 obvious。","tags":["#資料專案"]},{"label":"成功心法二:耐心 + 協作 + 資訊通透","summary":"窗口 30–50 起跳(IT 約 10);新問題要新方法;資訊多比少好,別預設「這你該知道」。","tags":["#方法論"]},{"label":"2025 計畫","summary":"溝通計劃、依專案分類的必要文件清單、文件大綱 + 產生器(跨社群與 Latte 合作);資料專案分兩類—Data Infra 建置(蓋食品工廠)vs Data Product 開發(產線生產計劃)。","tags":["#方法論"]}],"metaphors":["孤獨馬拉松 vs 一群人陪跑","食品工廠(Infra)vs 生產計劃(Product)"],"links":[5,12,14,19],"date":null,"transcriptFile":"EP08.txt"},{"id":9,"title":"專訪 DQSentry 產品經理 Jim","type":"product","arc":null,"host":"Anna","guests":[{"name":"Jim","role":"資料方案架構師暨產品經理 / DQSentry PO"}],"keyPoints":["DQSentry 是什麼、目標金融/政府","為何自研、資料品質產品國際現況","給新創 PM 的心法"],"segments":[{"label":"產品定位","summary":"相容於上線/版控流程平台的「企業級資料驗證中心」;鎖定資料品質市場;使用者=資料產品開發者(資料工程/加工/分析團隊)。","tags":["#product"]},{"label":"解決兩問題","summary":"①上線前無法預知資料品質→反覆上下線→解法:驗證「左移」到開發 + 企業級標準流程 ②驗證案例重複開發、標準不一→解法:分層驗證範本庫。","tags":["#資料治理"]},{"label":"為何服務公司做產品","summary":"先啟動公司級調查(使用者畫布/價值主張)→發現既有產品/框架無法解;從「以為專案沒做好」一路反思到值得做產品。","tags":["#product"]},{"label":"左移(Left Shift)","summary":"借 DevOps 概念,把驗證往上游推進;呼應敏捷的迭代與初期範圍難定。","tags":["#方法論"]},{"label":"客戶過去怎麼解","summary":"工程師自學分層框架、跨部門釐清標準答案、驗證邏輯埋進程式碼;非一次性—每次商業邏輯變動就漫長修正。","tags":["#資料治理"]},{"label":"為何規模/頻率變大","summary":"GenAI 前資料問題有 buffer(報表月出可審);走向輔助/自動決策後沒時間過篩(30 年前直接叫 DBA 改數字的時代已不可能)。","tags":["#AI"]},{"label":"Data Contract(資料契約)","summary":"供應者與需求方達成共識,含 SLA/OLA、退貨/重新供貨—背反一般軟體工程(軟體只有 bug fix,資料多一層保證)。","tags":["#資料治理"]},{"label":"亞洲 vs 歐美","summary":"亞洲企業偏好強力具體的檢驗指引/範本,取代逐案做 Data Contract;DQSentry 走分層範本庫、開箱即用。","tags":["#市場"]},{"label":"市場現況","summary":"2030 前資料品質市場 CAGR 15–17%;將結合資料可觀測性、GenAI 模組;競品切點各異(CI/CD、工程師工具),尚未細分成獨立刺激市場(估約五年)。","tags":["#市場"]},{"label":"PM 心法","summary":"與 BO/投資人談(藍圖/ROI/demo)、與開發團隊協作(把市場脈絡帶給工程師)、協調 priority 衝突;Sprint 模式下產品可能下個 sprint 被夭斬(非傳統一年預算);PO(看 1 年)vs PM(看 3 年 roadmap);自我 review(DDD 核心 vs 輔助域、收集痛點、用 fail case 反證方向)。","tags":["#product"]}],"metaphors":["見賢思齊、見不賢內自省","台灣缺 PM/Product Marketing 人才"],"links":[4,11,13,20],"date":null,"transcriptFile":"EP09.txt"},{"id":10,"title":"專訪寬橋 執行長 Armani、首席架構師 Fred","type":"external","arc":null,"host":"Anna","guests":[{"name":"Armani","role":"寬橋 總經理"},{"name":"Fred","role":"寬橋 首席架構師"}],"keyPoints":["寬橋創業故事與服務","「資料應用」未來三年趨勢","如何打造成功的高技術門檻專案"],"segments":[{"label":"寬橋定位","summary":"務實又浪漫的科技公司,聚焦 Data Mesh + Kubernetes + 微服務(資訊系統現代化三軌);相信技術解決問題而非製造問題。","tags":["#資料工程"]},{"label":"核心產品 Gravity","summary":"Data Mesh 產品;命名取「重力」—資料有重量、藏在各 silo 資料庫,抽出做解耦才能無限擴張應用。","tags":["#資料工程"]},{"label":"創業背景","summary":"2019 Anna 預言三年後發酵;20 年來台灣多用套裝/單體架構,老舊 COBOL/PL1/LISP「史前巨獸」改一點就爆炸;企業 IT 像迷宮/黑盒子(「神的旨意」)。","tags":["#市場"]},{"label":"新舊世界的橋樑","summary":"slogan「跨破境界、橋接未來」;把 legacy 過渡到 modern application;mission-critical(金融/醫療)出問題會出人命/賠大錢。","tags":["#資料工程"]},{"label":"趨勢:主動式資料驅動","summary":"AI 產生更多資料;從 data-driven 到 application/主動 data-driven—系統主動推資料(電影訂票:依約束直接給選項,而非層層下拉);即時/串流是未來但「舊的還沒做完新的就來」。","tags":["#AI"]},{"label":"Big Data 浪漫落空","summary":"想合併結構化+非結構化產生 insight 沒發生,因 AI/application 端沒打開需求;金融前/中/後台偶合度太高。","tags":["#資料工程"]},{"label":"AI 對工程師的衝擊","summary":"AI 產的 code 品質不錯,但不會把材料組裝對應現實(周星馳「要你命三千」每樣致命綁起來變垃圾);人提供彈性與整合,懂協作就有好日子。","tags":["#AI"]},{"label":"高門檻專案成功三法","summary":"①堅強團隊 ②耐心 ③敏捷/MVP—客戶缺「勇氣」翻 mission-critical 系統,故挑低風險高價值小痛點(2–3 月)先證明價值。","tags":["#方法論"]},{"label":"瀑布 vs 敏捷的本質","summary":"Waterfall=理性主義、Agile=經驗主義;前提假設不同故不可並用;做沒做過的事就該敏捷;敏捷合約(非 fix price 非工料,介於兩者)台灣待發展。","tags":["#方法論"]},{"label":"未來:AI Data Infra","summary":"企業內部資料(資料庫/文檔)LLM 看不到;寬橋當資料平台 coordinator/orchestrator 做 semantic layer 強化餵 AI(提到美國 40B 公司以 AI 為人機界面—影射 Palantir)。","tags":["#AI"]}],"metaphors":["資料有重力","legacy=迷宮/黑盒子","史前巨獸","新舊世界的橋樑","AI 的 code 是「要你命三千」"],"links":[4,11,15,17],"date":null,"transcriptFile":"EP10.txt"},{"id":11,"title":"專訪 DBES 副總 Lancelot、技術顧問 Asa","type":"people","arc":null,"host":"Anna","guests":[{"name":"Lancelot","role":"許志玄,DBES 副總,1998 起教 SQL"},{"name":"Asa","role":"技術顧問,前 DBA 12 年"}],"keyPoints":["為何成立 DBES","DBES 服務、企業如何規劃雲地","DBA 角色任務的變化與人才前景"],"segments":[{"label":"DBES 是什麼","summary":"Database Expert Services;炬識五大 BU 之一;資料庫專業技術顧問與諮詢;不限單一資料庫(從 MS SQL 出發)。","tags":["#資料工程"]},{"label":"成立背景:疑難雜症","summary":"逾 400 客戶;硬體廠商推銷「換硬體解效能」、AP 廠商推託;董事長殺價買好 server 卻沒買 storage 之例。","tags":["#市場"]},{"label":"升級=搬家","summary":"安裝不難但「好的/適合未來的安裝」有差;一般客戶三五年升級一次,DBES 一年升數十台,經驗完全不同。","tags":["#資料工程"]},{"label":"Microsoft Data Platform / 雲地策略","summary":"上雲後選擇變多但更複雜;純雲少見(台灣人力電力便宜、MES 斷網不能生產);「原封不動搬上雲」=昂貴,「最新鮮的是帳單」。","tags":["#資料工程"]},{"label":"DBA 三字不重要","summary":"Asa 歷程:很會寫 SQL→很會裝→「比後端更後端」→「道士消災解厄」;同名 DBA 各做不同事;面試挑不到合適人(daily operation 差異大)。","tags":["#組織"]},{"label":"DBA = 最後防線","summary":"資安掛在 DBA(最靠近資料);機合是證 DBA 清白;煙霧探測器之喻—警示不是火災的原因(連線數暴增是攻防演練)。","tags":["#資料治理"]},{"label":"DBA 難養成","summary":"最好有開發背景(知道開發幹了什麼蠢事),但這群人多繼續當 dev/SA/PM;立志當 DBA 者少。","tags":["#組織"]},{"label":"關注 behavior pattern","summary":"系統工程師看 status/usage、AP 工程師看 success/fail,DBA 看行為模式;Dynatrace 多放 AP team 而非 DBA。","tags":["#資料工程"]}],"metaphors":["藤原豆腐店/秋名山(駕駛技術 vs 該買對的車)","SA 也可能是「資深彩妝師 Senior Artist」","煙霧探測器 vs 火災"],"links":[4,5,9,17],"date":null,"transcriptFile":"EP11.txt"},{"id":12,"title":"專訪 BizDevOps 社群:把商業價值融入資料專案","type":"community","arc":null,"host":"Anna","guests":[{"name":"Mindy","role":"BizDevOps 社群理事長,來自人資"},{"name":"Carey","role":""},{"name":"Asa","role":""}],"keyPoints":["BizDevOps 是什麼","「Show Me Your 腦」沙龍全解析","如何讓不同背景成員協作、全員主動參與"],"segments":[{"label":"BizDevOps 定位","summary":"五大社群之一,**非**硬技術社群;把 DevOps 精神帶到商業層,目標仍是交付客戶價值;理事長 Mindy 來自人資(社群橫跨功能單位/BU)。","tags":["#組織","#社群"]},{"label":"沙龍緣起與時程","summary":"「Show Me Your 腦」(Now=Brand=腦);籌備近兩月、多次 dry run;從 6/6 提前到 4/25 以避開 DevOps Taipei 2025(從共用行事曆的請假發現);目標全員(約 20 人)參與。","tags":["#社群"]},{"label":"How Might We 破冰","summary":"Asa 把外部課程的 HMW 帶進來;社群先玩兩三次當種子教師;「億萬富翁投資什麼」當暖身。","tags":["#方法論"]},{"label":"三道硬題","summary":"①對客戶介紹炬識 Data&AI 三角(Data Infra→BI)②核心能耐拆解 ③用「現代企業架構框架」談組織挑戰;設計成桌遊(目標/過程/任務),軸心「你的大腦+我的大腦」。","tags":["#組織"]},{"label":"設定 TA 人物誌","summary":"同一份簡報對承辦窗口/長官/高層說法不同;每組預想對方提問與回應。","tags":["#方法論"]},{"label":"隱含的敏捷實踐","summary":"自主認領任務、pair(兩兩一隊)、MVP(最快 MVP 是打壞別人的 MVP)、積極聆聽、適才適所 + 多元性。","tags":["#敏捷"]},{"label":"刻意錯置成員","summary":"工程師/業務/顧問/PM 打散、健談與安靜交錯;靠 TWRP board + 行事曆做高透明度資源盤點。","tags":["#組織"]},{"label":"感動時刻","summary":"沒人滑水、全程投入;第二天 on board 的新人主動加入社群。","tags":["#社群"]},{"label":"CEO 視角","summary":"這正是橫跨所有 skill/function 的共同任務—交付高客戶價值—的落實。","tags":["#組織"]}],"metaphors":["Show Me Your 腦","你的大腦+我的大腦","最快的 MVP 是打壞人家的 MVP"],"links":[8,14,18,20],"date":null,"transcriptFile":"EP12.txt"},{"id":13,"title":"探索 DDD Taiwan 社群:商業與 IT 溝通的橋樑","type":"community","arc":null,"host":"Anna","guests":[{"name":"Arthur","role":"張國璋"},{"name":"Kim","role":"DDD 社群"},{"name":"Michael","role":"陳勉修"}],"keyPoints":["什麼是 DDD、如何成為商業與 IT 溝通框架","社群成立背景、解決跨域溝通","接軌國際","過去成果與未來"],"segments":[{"label":"2022 商業模式轉向的痛點","summary":"炬識從資訊服務轉資料顧問主導,需新方法跨 Business/Data/IT 的 domain language;data↔IT 易跨,但資料架構↔商業需求遇大麻煩→找到 DDD 社群。","tags":["#方法論"]},{"label":"社群緣起:孤獨感","summary":"三人皆敏捷圈出身;研究 DDD 很孤獨(當年繁中資料極少,得看英文/簡中);便利商店樓下相認;冷雨的 12 月起念。","tags":["#社群"]},{"label":"DDD 是什麼 / Domain 指什麼","summary":"Eric Evans 2003,比微服務資深;Domain=有主題的知識領域(零售/金融的底層邏輯);DDD=庖丁解牛降認知負擔(分群/分級/分層)+ 戰術 pattern 寫高內聚低耦合的 code。","tags":["#方法論"]},{"label":"與微服務/DevOps/敏捷的關係","summary":"敏捷以人為本→認知負擔;Chris Richardson、Sam Newman 都引 DDD 定服務邊界;MDA(model→code)曾失敗,UML 是溝通用。","tags":["#方法論"]},{"label":"Wardley Map","summary":"把力氣投在 genesis/高價值處,utility/commodity 部分用現成的搭配;呼應分層架構與 Feature Engineering。","tags":["#方法論"]},{"label":"Domain Storytelling vs User Story","summary":"User Story 是需求情境化切 task;Domain Storytelling 偏 modeling—讓流程顯現、把 Bounded Context 切乾淨(金流系統共識)。","tags":["#方法論"]},{"label":"國際連結","summary":"DDD China(重實作/落地)、DDD EU(偏哲學/戰略/組織轉型)、Virtual DDD(Kenny Baas-Schwegler,24 小時馬拉松,台灣當第一講者,銜接 Eric Evans/Vaughn Vernon)。","tags":["#社群"]},{"label":"成果回顧","summary":"三創首場 70 人(2 人籌備);演講→工作坊→讀書會(紅皮書《實踐領域驅動設計》核心志工)→年會培訓(AWS 辦公室 rehearsal);DDD 一詞被各社群廣泛指導。","tags":["#社群"]},{"label":"2025:成果發表會","summary":"非年會;AI 元年、做中學、90 分鐘演練 + 業界 AI×DDD 經驗;11/8、四個 topic。","tags":["#AI"]}],"metaphors":["庖丁解牛那把刀","Proven Solver(T 恤標語)","詞海一頁 vs 整本"],"links":[7,8,12],"date":null,"transcriptFile":"EP13.txt"},{"id":14,"title":"專訪 CEXO、台灣敏捷大賞冠軍 Rita","type":"people","arc":null,"host":"Anna","guests":[{"name":"Rita","role":"CEXO,被戲稱「被 HR 耽誤的偽工程師」"}],"keyPoints":["HR 也能做產品?把新人 Onboarding 做成獲獎產品","從 CHRO 到 CEXO 的思維轉變","用敏捷思維把文化內建在日常"],"segments":[{"label":"得獎與身分","summary":"拿台灣敏捷大賞「年度產品負責人」,可能是首次由員工體驗產品獲獎;Rita 不會 coding,AI 時代讓一切不同。","tags":["#敏捷"]},{"label":"成長型組織的困境","summary":"新人最好馬上即戰力卻多卡在「人(誰有空照顧)」與「資訊(在哪)」的灰暗處;買 50–100 萬系統難貼合每兩年大改的組織。","tags":["#組織"]},{"label":"產品「新手村」","summary":"不是 onboarding 文件/流程圖,是完整 HR 系統,像線上 RPG(希臘羅馬故事、金羊毛);用遊戲化 + 培訓經驗,故事/畫面打包給 AI;建在 Notion。","tags":["#product"]},{"label":"三節點 + 模組化","summary":"解決找方向、知道問誰、知道往哪;模組型、無闖關門檻(體現敏捷,有別於瀑布一關關過)。","tags":["#敏捷"]},{"label":"Product Backlog 與 Tracking","summary":"拆任務=backlog;上線後追蹤 status/progress、初算合理進度,出手協助而非監督;HR 少見的反覆測試迭代。","tags":["#敏捷"]},{"label":"容量設計(Capacity)","summary":"20 工作天 = 一個月約 20 位新人,連續報到吃得下=系統上限=壓力測試標的。","tags":["#product"]},{"label":"其他產品","summary":"拉普達(天空之城,僱主品牌頁,連到招募/面試)、黑美(哈利波特貓頭鷹,Slack FAQ bot + 加班申請自動化)。","tags":["#product"]},{"label":"CHRO→CEXO","summary":"先把 HR 改名 Talent Success(學 Customer Success「幫人才成功」),再改職稱;員工體驗=員工在企業各階段的旅程感受,核心是降阻力、留才。","tags":["#組織"]},{"label":"文化內建,不是文化課","summary":"文化課/玩遊戲與工作場域脫離;把文化 mix 進日常產品,潛移默化;承認過去十年講師成效不及格,打破自己的認知框架。","tags":["#組織"]},{"label":"HR 的路口","summary":"制度只是牆上告示、不能被使用;產品化讓不同人執行差異縮小(ISO 四階:表單=4 階,產品=One for all);HR 可選擇當流程執行者或組織痛點解方設計者。","tags":["#組織"]}],"metaphors":["新手村/拉普達/黑美","軌道車(放著自己跑但看得見)","on board 不要開驚喜包(會變驚嚇包)"],"links":[1,8,12,20],"date":null,"transcriptFile":"EP14.txt"},{"id":15,"title":"專訪 UiPath:RPA 與流程智慧","type":"external","arc":null,"host":"Anna","guests":[{"name":"Steven Chu","role":"UiPath"},{"name":"Uriah Feng","role":"UiPath"}],"keyPoints":["RPA 的來龍去脈與 UiPath 的定位","流程探勘(Process Mining)與流程智慧(Process Intelligence)","自動化專案如何落地、與資料專案的橋接"],"segments":[{"label":"RPA 的歷史","summary":"UiPath 2005 年以 DeskOver 起家(外包/函式庫)、2012–15 轉做 RPA、2021 上 NASDAQ;RPA 本質是「過渡期技術」,在系統升級前先把人工流程自動化。","tags":["#市場"]},{"label":"什麼是 RPA","summary":"軟體機器人模擬人在 GUI 上的操作(點選、下拉、複製貼上),不動底層系統;適合舊系統無 API、短期內無法汰換的場景。","tags":["#AI"]},{"label":"Process Mining vs Data Mining","summary":"資料探勘找資料中的模式;流程探勘從系統日誌(event log)還原「實際流程」長相,常與「想像中的流程」差很大。","tags":["#資料治理"]},{"label":"流程智慧 Process Intelligence","summary":"= Process Mining + Task Mining + AI/ML + 視覺化;Task Mining 補捉桌面端操作,讓沒進系統的步驟也現形。","tags":["#AI"]},{"label":"誰是對口部門","summary":"多落在流程改善/數位轉型/IMO(常在 COO 之下);需要由上而下推動,專案週期常 1–2 年。","tags":["#組織"]},{"label":"流程描述語言","summary":"用 BPMN、Visio 畫流程;但畫出來的常是理想,真實要靠探勘佐證。","tags":["#方法論"]},{"label":"會取代 ETL / BI 嗎","summary":"定位不同:RPA 從 GUI 介面萃取(資料工程少見的取數方式),補的是「系統與系統之間、人在中間補位」的縫隙。","tags":["#資料工程"]},{"label":"新舊世界的橋樑","summary":"RPA 是讓舊流程平滑過渡到新系統的橋;呼應炬識「新舊世界橋樑」的角色語彙。","tags":["#比喻"]},{"label":"兩種靈媒","summary":"UiPath 是「流程的靈媒」(把看不見的流程叫出來),炬識是「資料的靈媒」;互為鏡像。","tags":["#比喻"]},{"label":"社群年會預告","summary":"11 月有社群/年度活動串連,延續跨領域交流。","tags":["#市場"]}],"metaphors":["流程的靈媒 vs 資料的靈媒","畫出來的流程 vs 跑出來的流程","過渡期的橋"],"links":[5,10,17,19],"date":null,"transcriptFile":"EP15.txt"},{"id":16,"title":"專訪 IC Jan 詹益鑑:天使投資與台灣全球天使 TGA","type":"external","arc":null,"host":"Anna","guests":[{"name":"IC Jan 詹益鑑/詹奕健(TGA 共同創辦人","role":""},{"name":"科技解密 Podcast 主持","role":""},{"name":"今周刊專欄)","role":""}],"keyPoints":["天使投資與創業生態的視角","為何美國軟體獨大、台灣的機會","TGA 的運作模式與「像 EMBA 的投資學習」"],"segments":[{"label":"來賓背景","summary":"IC Jan 橫跨創投、媒體(科技解密 Podcast)、專欄;從投資人角度看資料與 AI 創業。","tags":["#市場"]},{"label":"TGA 的緣起(三個理由)","summary":"2022 年成立:COVID 加速數位經濟、美中脫鉤帶來供應鏈位移、台灣面臨二代接班;三股力量推著台灣資本走向海外早期投資。","tags":["#市場"]},{"label":"美國獨角獸與金字塔","summary":"美國能養出大量 10 億美元獨角獸,靠的是巨大的市場、資本與「金字塔」式的人才/退場結構。","tags":["#市場"]},{"label":"實體 AI 與資料品質","summary":"談 physical AI / 實體資料,強調 garbage in garbage out——感測與資料源頭的品質決定 AI 上限。","tags":["#AI"]},{"label":"美國在「備戰」","summary":"觀察美國在資安、超限戰、無人機等領域的投入,牽動科技與資本流向。","tags":["#市場"]},{"label":"美國軟體為何稱霸","summary":"龐大本土市場 + 充沛資本 + 世界 500 強成為「事實標準」客戶(Oracle/IBM/SAP/Salesforce),形成正向循環。","tags":["#市場"]},{"label":"TGA 的結構","summary":"約 75 名會員,年費約 8000 + 4000 美元,以 SPV 共投、平台抽約 10%,採共識決;像投資俱樂部。","tags":["#市場"]},{"label":"像創業投資的 EMBA","summary":"會員一起看案子、學盡職調查,過程本身就是教育;投資報酬之外更像進修。","tags":["#市場"]},{"label":"隱藏福利","summary":"會員子女有機會赴美實習等附加價值,屬於投資以外的人脈紅利。","tags":["#市場"]},{"label":"投連續創業家、退場最難","summary":"傾向投有紀錄的 serial entrepreneur;整個流程中「退場(exit)」是最困難的一關。","tags":["#市場"]},{"label":"時速 300 vs 80","summary":"再次對照矽谷與台灣的節奏差異(矽谷時速 300、台灣 80),解釋為何要把資本與視野接到國際。","tags":["#比喻"]}],"metaphors":["時速 300 vs 80","像創業投資的 EMBA","garbage in garbage out","金字塔結構"],"links":[4,7,10,17],"date":null,"transcriptFile":"EP16.txt"},{"id":17,"title":"Palantir:本體論、前進部署工程師與「相反的打法」","type":"founding","arc":null,"host":"Anna","guests":[{"name":"Asa","role":"技術顧問"},{"name":"CC","role":"技術顧問"},{"name":"Jim","role":"資料方案架構師暨產品經理"}],"keyPoints":["Palantir 的起源與「與產品公司相反」的打法","本體論 Ontology 與數位孿生","前進部署工程師(FDE)與去中心化文化"],"segments":[{"label":"起源與創辦人","summary":"約 2003 年(911 後)由 Peter Thiel(PayPal 幫)為國安而創;切入反恐與情報。","tags":["#市場"]},{"label":"Alex Karp 與使命","summary":"法學院背景 CEO,著《科技共和國》,主張強化美國、甚至談「如何精準殺人」的爭議定位。","tags":["#市場"]},{"label":"股價與政府營收","summary":"股價從約 10 美元漲到約 180;某季政府營收年增約 50%、達 4.26 億美元。","tags":["#市場"]},{"label":"相反的打法","summary":"不像產品公司先做通用品再找客戶;而是先深入第一線的一手需求、為單一極端場景客製,再把累積的能力規模化,並擁有自己的本體論、從零打造。","tags":["#市場"]},{"label":"先打最極端環境","summary":"從沙漠、伊拉克、核電廠等「零容忍」場景練起,能在最嚴苛處活下來再外推。","tags":["#市場"]},{"label":"The Nuclear Company 例子","summary":"上萬名工人每日看儀表板協作,展示 Palantir 在重工業/高風險場域的落地。","tags":["#資料治理"]},{"label":"五大產品","summary":"AIP、Data Foundry、Gotham、Apollo、以及核心的 **Ontology**。","tags":["#AI"]},{"label":"Ontology 是什麼","summary":"以 GenAI「沒辦法」自行細猜為例,說明需要本體論讓資料輸入變動態;把語義固定下來,模型才不會亂猜。","tags":["#資料治理"]},{"label":"本體論的三層","summary":"依變動頻率分層:L1 穩定的定義、L2 系統、L3 權限;變動慢的在底層、變動快的在上層。","tags":["#資料治理"]},{"label":"與數位孿生的連結","summary":"數位孿生若由 IT 定義會「凍結時間」而失敗;反洗錢(AML)這類動態場景反而適合本體論驅動。","tags":["#資料治理"]},{"label":"蜂群式文化","summary":"內部像蜂群、共識決、去中心化,與炬識的組織哲學相互呼應。","tags":["#組織"]},{"label":"需求是稀缺的","summary":"真正的一手需求很稀缺,所以要把最強的人送到最前線。","tags":["#市場"]},{"label":"前進部署工程師 FDE","summary":"Forward Deployed Engineer 駐點第一線,當「高頻寬感測器」把現場訊號高保真帶回。","tags":["#組織"]},{"label":"Ontology ≠ 數據中台/ETL","summary":"釐清本體論不是把資料搬一搬的中台或 ETL,而是語義與規則的骨架。","tags":["#資料治理"]},{"label":"呼應寬橋 EP10","summary":"連回 EP10 那家 400 億美元的 AI Data Infra 公司,對照大廠如何看資料基礎建設。","tags":["#市場"]}],"metaphors":["相反的打法","高頻寬感測器(FDE)","凍結時間","蜂群與共識決","需求是稀缺的"],"links":[9,10,15,18,20],"date":null,"transcriptFile":"EP17.txt"},{"id":18,"title":"專訪 Birdman 邱銘彰(奧義智慧 CyCraft CTO):湧現、混沌邊緣與自組織","type":"people","arc":null,"host":"Anna","guests":[{"name":"Birdman 邱銘彰","role":"奧義智慧 CyCraft 共同創辦人暨 CTO,資安 × 資料科學"}],"keyPoints":["從資安到資料科學的視角:AI 知識比 AI 模型重要","DIKW 與「知識=可萃取的結構」","複雜系統:湧現、自組織、混沌邊緣與耗散,如何映射到公司經營"],"segments":[{"label":"來賓背景","summary":"邱銘彰是資安老將也是資料科學家、連續創業者,有 NeurIPS 論文;CyCraft 每天約 30 億筆日誌、覆蓋 40–50 萬台電腦。","tags":["#市場"]},{"label":"自動化是生存必需","summary":"在那種規模下自動化不是選項而是必需,形容「像在開鋼彈」——人要被機器放大。","tags":["#AI"]},{"label":"AI 知識 > AI 模型","summary":"真正稀缺的是「對問題的 AI 知識」,不是換一個更大的模型。","tags":["#AI"]},{"label":"DIKW 階梯","summary":"Data(數位化)→Information(加上型別/metadata)→Knowledge(結構/流形,且與任務相關)→Wisdom(萃取知識的能力)。","tags":["#資料治理"]},{"label":"台灣愛硬幹","summary":"觀察台灣過度聚焦工程實作(硬幹),較少談結構與抽象。","tags":["#市場"]},{"label":"ML 是在找結構","summary":"機器學習本質是在資料中找結構/流形,呼應 DIKW 的 Knowledge 層。","tags":["#AI"]},{"label":"湧現 Emergence","summary":"概念來自物理/凝聚態:整體展現出個體沒有的性質;公司是非線性系統,10 人 ≠ 10 倍。","tags":["#組織"]},{"label":"複雜系統與聖塔菲","summary":"引 Santa Fe Institute 的複雜系統觀,公司無法被線性預測。","tags":["#組織"]},{"label":"自組織","summary":"給方向與文化、而非給規則;老闆是「造車 + 給獎勵」而不是那匹馬;Anna 自己從「馬」進化成「造路的人」。","tags":["#組織"]},{"label":"巨觀結構創造新因果","summary":"上層湧現出新的因果律(人有愛、碳原子沒有);管理要在對的層次施力。","tags":["#組織"]},{"label":"混沌邊緣 Edge of Chaos","summary":"調整溝通模型、容忍掉封包,讓系統停在臨界:太有序像監獄、太混沌會散掉。","tags":["#組織"]},{"label":"純理性環境很脆弱","summary":"完全理性、零冗餘的系統反而易碎,缺乏應變空間。","tags":["#組織"]},{"label":"耗散與冗餘","summary":"刻意保留第二、三層冗餘(耗散/低效),活著本來就會浪費能量;沒有 slack 就沒有優化的動機。","tags":["#組織"]},{"label":"規模是隱藏維度","summary":"規模本身是一個隱藏的維度/規格(快取要撐 5、50、還是 50000 使用者,設計完全不同)。","tags":["#資料工程"]},{"label":"演唱會疏散的柱子","summary":"出口放一根柱子反而降低人流「渦流」、加快疏散;以物理直覺說明刻意的「阻礙」帶來秩序。","tags":["#比喻"]},{"label":"自組織的兩個條件","summary":"需要非線性互動(成員要同時與主管、主管的主管關聯,且關係不對稱)+ 耗散;炬識三層組織恰好對映複雜系統。","tags":["#組織"]},{"label":"資料科學團隊只是讀論文?","summary":"自嘲 DS 團隊「就是讀論文」,點出研究與落地的張力。","tags":["#AI"]},{"label":"CyCraft 2026","summary":"預告公司 2026 的方向。","tags":["#市場"]}],"metaphors":["像在開鋼彈","混沌邊緣","造車 vs 當馬","演唱會的柱子","活著就會浪費","規模是隱藏的維度"],"links":[6,8,17,20],"date":null,"transcriptFile":"EP18.txt"},{"id":19,"title":"2025 資料專案 PM 生存實錄(EP8 續集)","type":"people","arc":null,"host":"Anna","guests":[{"name":"Carey","role":"PM & BU Head"},{"name":"Junna","role":"業務/特種 PM"},{"name":"Lumi","role":"PM"},{"name":"Mitch","role":"PM"}],"keyPoints":["資料服務業=「以軟體為設備的製造業」","2025 年四個資料專案鬼故事","覺醒的客戶、DIKW 與 metadata、2026 計畫"],"segments":[{"label":"以軟體為設備的製造業","summary":"資料服務談「批次、良率」而非單純 IT 的 bug;產線思維讓品質可量測。","tags":["#比喻"]},{"label":"WBS 難一次到位","summary":"資料專案前期難把工作分解結構(WBS)一次估準,需要迭代。","tags":["#方法論"]},{"label":"2025 敏捷 vs 瀑布調查","summary":"現場投票約 80% 敏捷、不到 20% 瀑布;但多數「瀑布」其實是客戶認知裡的瀑布。","tags":["#方法論"]},{"label":"鬼故事①(Carey):AI 標註資料庫","summary":"客戶把 60 欄 × 3000 列用人工 Excel 維護;炬識導入 GitLab 做「資料版控」(超越 ETL 的版本控制),並用 given-when-then 規格化。","tags":["#資料工程"]},{"label":"鬼故事②(Junna):50 個利害關係人","summary":"業務即「特種 PM」,面對 50 個 stakeholder 與滿天內部黑話,靠建立利害關係人地圖(stakeholder map)收斂。","tags":["#組織"]},{"label":"鬼故事③(Lumi,接 EP8):資料源 1 變 4","summary":"客戶把資料源從 1 個變 4 個,RFP 有漏洞、技術債堆積;用「果汁→甘蔗」比喻成本暴增,客戶把專案延長 5 倍。","tags":["#資料工程"]},{"label":"鬼故事④(Mitch):升級變停擺再重建","summary":"升級案因政策變更停擺、最後當成全新建置;關鍵使用者升級成事業單位;用「川菜」比喻口味/需求一直變。","tags":["#方法論"]},{"label":"覺醒的客戶","summary":"零售上雲、金融做知識圖譜的客戶開始懂「用 AI 前要先教育它/先做資料治理」。","tags":["#AI"]},{"label":"DIKW + metadata","summary":"Excel 自助旅行表的表頭就是 metadata;欄位叫 column123456 是惡夢;純文字資料缺乏被強制的 metadata。","tags":["#資料治理"]},{"label":"2026 計畫","summary":"訂 retro 規則、會議命名規範、導入 AI 文件工具(NotebookLM)、整理成員名冊;讓社群規範逐步上升為公司規範。","tags":["#組織"]}],"metaphors":["以軟體為設備的製造業","果汁→甘蔗","川菜","用 AI 前要先教育它","GitLab 管資料版本"],"links":[2,8,14,17,20],"date":null,"transcriptFile":"EP19.txt"},{"id":20,"title":"專訪事業單位主管 Carey:三維立體組織與共識決","type":"people","arc":null,"host":"Anna","guests":[{"name":"Carey","role":"Business Unit Head,公司最大 BU"}],"keyPoints":["炬識「三維立體組織」全貌(HACOM/Projecting/Communities)","AI 時代為何更需要資料團隊、主管的多重角色","共識決 vs 主管決、信任與長期主義"],"segments":[{"label":"三維立體組織總覽","summary":"第一維 HACOM(總部 + 事業單位)、第二維 Projecting(專案)、第三維 Communities(學習型社群);BU 是成本中心、Projecting 是利潤中心。","tags":["#組織"]},{"label":"AI 時代更需要資料團隊","summary":"資料是 AI 的燃料;多數企業是模型的「使用者」而非開發者,更需要把資料整理好。","tags":["#AI"]},{"label":"團隊規模與差異化管理","summary":"團隊約 4 人;不同類型團隊管理方式不同,沒有一招打天下。","tags":["#組織"]},{"label":"主管的人格特質","summary":"開放心態、抗壓、不恥下問;特質可後天培養。","tags":["#組織"]},{"label":"主管角色拆解","summary":"mentor(顧職涯)、coach(盯菜單)、supervisor(賞罰)、tutor(一對一操作)、peer(情緒支持);社群正好補上 peer 與 tutor。","tags":["#組織"]},{"label":"可預測性","summary":"引 Google 研究,團隊要可預測、避免「恐怖統治」式管理。","tags":["#組織"]},{"label":"讓技術成員炫技","summary":"給舞台讓工程師展示、建立信心(100%),主管當啦啦隊。","tags":["#組織"]},{"label":"PM 需要同理心","summary":"對人對事都要能換位思考。","tags":["#組織"]},{"label":"共識決 vs 主管決","summary":"資料專案技術決策彼此相依(製程一步接一步),因此共識決是「勝利方程式」;主管決用於該拍板處。","tags":["#方法論"]},{"label":"資源配置","summary":"依技能匹配 + 留成長空間 + 取得「願意被挑戰」的同意;主管留在頻道看「小火苗」而非監督,私下委婉處理。","tags":["#組織"]},{"label":"過度溝通與廣播","summary":"over-communication、broadcast,允許掉封包,重要的事自然會浮上來。","tags":["#組織"]},{"label":"第一線資訊最便宜","summary":"越早從第一線拿到資訊成本越低;階層式上報會失真。","tags":["#組織"]},{"label":"與客戶的信任(呼應 EP17)","summary":"以 Palantir 為榜樣談信任帶來的 200% 成長,回扣 EP17。","tags":["#市場"]},{"label":"韌性與「不完整」","summary":"主管的韌性從挫折長出;直到「讓一個人離開」才算完整。","tags":["#組織"]},{"label":"勞基法 vs 契約自由","summary":"台灣勞基法的持續性聘僱 vs 美國契約自由;很多公司因此容忍「冷凍人」。","tags":["#市場"]},{"label":"主管的責任","summary":"把對的人放到對的位置;需要強心臟 + 判斷力 + 時機(何時揭露資訊)。","tags":["#組織"]},{"label":"換公司不換產業","summary":"建議換公司別換產業,因為產業判斷力的「code」要重設成本高。","tags":["#市場"]},{"label":"組織轉型的織網","summary":"框架由 AMP 社群決定、CI/CD 由技術社群決定,跨社群用「AM Co-create」;人人織成網、不同角色不同場景,幾乎所有人都當過理事長。","tags":["#組織"]},{"label":"失敗案例 AM Master","summary":"積分制/金幣 + 與獎金連動「失敗」;榮譽應與績效脫鉤;現改為單純投票。","tags":["#組織"]},{"label":"主管層決策=委員會","summary":"主管層以委員會方式做決策,延續共識精神。","tags":["#組織"]}],"metaphors":["三維立體組織","勝利方程式(共識決)","看小火苗不監督","造路的人","榮譽與績效脫鉤","冷凍人"],"links":[8,14,17,18,19],"date":null,"transcriptFile":"EP20.txt"},{"id":21,"title":"專訪盧氪賽忒創辦人 Jason:AI 時代的資安、產品研發與企業管理","type":"external","arc":null,"host":"Anna","guests":[{"name":"Jason","role":"盧氪賽忒 LUCSI LAB 創辦人;台灣資訊安全協會副秘書長／台灣資安大聯盟副秘書長;TDOH 創辦人"}],"keyPoints":["從學生駭客社群 TDOH 到創業、從資安服務轉型產品原廠","AI 如何重洗資安市場的版圖(知識密集 × 資料密集)","2035 台灣資安市場預測與台日法規哲學"],"segments":[{"label":"來賓與淵源","summary":"Jason 23 歲創業(英雄出少年),公司年紀與炬識相近;與 Anna 相識約 12 年——Anna 也出身資安後轉大數據,兩人皆創業者。","tags":["#市場"]},{"label":"從 TDOH 學「治理」","summary":"2013 創立 TDOH(台灣少數正式化的學生資安推廣社群,跑遍北中南澎湖);當時只有 HITCON(非學生)、SITCON(學生計算機);在社群裡學會與「技術比你強、個性比你怪」的人協作,這是公司治理之前的治理經驗。","tags":["#組織"]},{"label":"社群的疫情轉折","summary":"疫情前社群到頂峰、年會號召力驚人(台中 500 人、宜蘭酒廠);疫情後無法聚集→線上化、大型聚會變少,但商業性的小社群一小群一小群反而更熱絡。","tags":["#市場"]},{"label":"命名與早創業的代價","summary":"公司「盧氪賽忒/LUCSI LAB」取自拉丁文學名、用網路算命湊字、無特殊含義;名字難念像「伏地魔」,被唸錯反而有印象;成立初衷其實是「想繼續玩社群 + 自由接顧問單」。","tags":["#市場"]},{"label":"資安市場起飛的時機","summary":"2015 成立、2016 政府大力灌資安預算;Snowden 事件、Ransomware(勒索病毒)推升企業重視。","tags":["#市場"]},{"label":"紅隊/藍隊/紫隊(科普)","summary":"紅隊源於二戰美軍被德軍滲透→模擬德軍;資安裡=模擬駭客找漏洞(滲透測試/紅隊演練);藍隊=防禦;紫隊=攻防之間的演練角色。","tags":["#方法論"]},{"label":"服務→產品的轉型","summary":"一次客戶合作發現做產品沒那麼難也賺錢→2019–21 轉型為產品原廠;把攻擊演練自動化成「攻擊模擬 BAS」,但脫離「跟付錢客戶對抗」的純紅隊心態。","tags":["#市場"]},{"label":"技術交付 ≠ 客戶價值","summary":"客戶嫌「報告太紅隊/太攻擊方」,要的是「藍隊視角、能改善、能知道」→催生第三、四代產品;企業投資都綁年度策略與預算,技術團隊不能只盯競品對抗,要接到承辦人每日的真實問題。","tags":["#市場"]},{"label":"資安為何 = 大數據","summary":"防火牆原理簡單(放行/不放行)但規則複雜到換人就沒人敢動;資安貼近「管理議題」、無絕對解、攻防皆多樣→必須靠全境狀況 + 系統 log 蒐集分析找問題,與大數據處理「多方重疊的複雜問題」同源。","tags":["#資料治理"]},{"label":"AI 重洗資安(速度面)","summary":"2020 GPT 橫空出世,早期當助理用;資安報告類文件多、人員常非 IT 背景(機械/DBA)溝通難→AI 先幫寫文件、再進到自動化分析/偵測,依賴度已高。","tags":["#AI"]},{"label":"知識密集 × 資料密集(核心框架)","summary":"資安與 AI 在「資料密集 + 知識密集」處最像、衝擊也最先最大;Claude 出新模型只開放 50 幾團隊、還去白宮——因為它找出專家看好幾遍都沒發現的重大漏洞,漏洞發現速度超越專家(不用睡覺),紅隊工作有機會被逐步替代。","tags":["#AI"]},{"label":"誰先遇危機:純資安 SaaS","summary":"AI 含量越高的資安 SaaS 衝擊越大(類比 Claude Design 衝擊 Figma/Canva);因為國外 RD 成本優勢消失、token 成本大廠更低、演算法依賴既有 AI 後與外商無差異、AI provider 自己就提供分析/找漏洞=「白牌變品牌」+ 上游價格優勢。","tags":["#市場"]},{"label":"AI 自製員工 digital staff","summary":"手握強模型者(Google/馬斯克)下一步可賣「數字化員工」:GWS 本就提供 email/calendar 等 OA 周邊,若精準掌握企業內部運作,可直接交付一個會操作 Gmail 帳號的數位員工——「你怎麼知道同事是不是真人?」","tags":["#AI"]},{"label":"水電工不會被取代","summary":"沒有 data input/output、得用人的手→難被 AI 取代;反證唯有「資料密集 + 知識密集」才高價值、也才會被衝擊;資安的保守特性(自動防禦需謹慎)給了市場緩衝期。","tags":["#比喻"]},{"label":"矽谷 SaaS 紅利與洗牌","summary":"美國創投「錢去哪、人去哪、市場就在哪」;矽谷從硬體(被列拒絕往來)轉 SaaS 成主流,但公有雲上真正成功的 SaaS 案例少→SaaS 紅利還沒吃完就被 AI 攪局;像「遠古地球天天火山爆發」,以前革命技術改變客戶決策要 5 年、現在 1–2 年甚至半年。","tags":["#市場"]},{"label":"SaaS 變夾心 Mediator","summary":"大型企業手握大量未整理的非結構化資料(非不願交、是量太大不知怎麼處理),沒人比他們更有優勢處理;SaaS 上要依附公有語言廠商、下服務的客戶又握著它拿不到的知識與資料→變「不上不下」的中介者。","tags":["#市場"]},{"label":"護城河=場景知識/產業深耕","summary":"客戶資料 + 產業潛規則 + 法規/文化差異 + 人際關係 = 難以交出的場景知識/商業邏輯,將成護城河;台灣從 SI(帶人進場整合)起家、過去被當不賺錢,但軟體被取代時,深耕特定產業的整合/顧問公司反而更有價值。","tags":["#資料治理"]},{"label":"顧問 + 交付要同隊(Accenture vs Palantir)","summary":"顧問出身=Accenture、軟體出身=Palantir(呼應 EP17),兩者都把「特定產業顧問 + IT/software 技術」合在一隊;台灣與政府常「規劃一群人、落地又一群人」行不通,導入大模型本質像 ERP 流程改造,更不能分家。","tags":["#市場"]},{"label":"給新創:挑領域生根","summary":"AI 時代市場高度不確定,但挑特定領域深耕一定有效、別什麼都做;政府愛出「通用中小企業方案」但產業太多無法一體適用→改與特定產業協會合作、理解情境。","tags":["#市場"]},{"label":"資安依 IT/OT 分流","summary":"資安分 IT(OA)與 OT(製造)差很大;最直接問客戶:「什麼東西不能停、會影響賺錢或營運?」電商營收全來自 IT、製造業靠產線(官網被打掉沒關係、但產線/ERP 不能停);企業投資有優先順序。","tags":["#市場"]},{"label":"卜卦 2035 台灣資安","summary":"年產值由現在約 600–900 億→2035 可能 1800–2000+ 億;結構從「代理商→SI→經銷商」轉向「綜合代理商最辛苦、頂尖原廠仍在、深耕情境的公司仍在、裝設備的水電工通路仍在」;AI Native 產品將取代傳統防火牆/規則/參數類工具(更直覺、自動、能自主決策),因攻擊走得比防守快。","tags":["#AI"]},{"label":"攻擊也被 AI 強化","summary":"釣魚信件精準扮演企業內部角色;魚叉式攻擊(spear phishing)客製化社交工程,以前有成本、現在成本無限低(心理學 × 行銷學 + vibe coding 連假網站/程式一起生成),傳統攔截因每封信都獨立而攔不完。","tags":["#AI"]},{"label":"法規決定市場(台日對比,壓軸)","summary":"真要預測要看法規:台灣去年立 AI 基本法但若無預算往下走形同懸置;日本走「軟法」(AI 促進法重鼓勵不限制)+ SECURITY ACTION(IPA,一二星自我宣告:裝防毒/更新/教育訓練)+ SCS(經產省,三星起、跟大商社走供應鏈)→不強制、以「領補助至少一星」與供應鏈要求把資安廣撒到 99% 中小企業,文化培養勝過硬性法規。","tags":["#市場"]},{"label":"歐美日法規哲學","summary":"歐盟從消費者保護出發(GDPR 罰很多美企)=被輸入國苛輸出方責任;美國 aggressive=輸出國不限制自己;日本/韓國這次也轉 aggressive(可能準備輸出);Jason 連跑日本三場 IT Week 觀察:去年「人力不足對策/業務自動化」展佔 7–80%(日本缺人又不愛用外國人→digital staff 市場大)、今年資安與國產 AI 產品起來、SCS 法規推進極快。","tags":["#市場"]},{"label":"日本的知識管理優勢","summary":"企業內部非結構化資料管理普遍很糟,但日本(整理狂/分類狂)特別好→若發展自有大模型恐有獨特優勢;台灣文化近似(曾受日治、中小企業比例同樣高 99%/97%),立法雖難但流程執行可借鑑。","tags":["#資料治理"]}],"metaphors":["念不出名字的伏地魔公司","水電工最安全","遠古地球天天火山爆發","白牌變品牌","夾在中間的 Mediator","你怎麼知道同事是不是真人"],"links":[10,16,17,18],"date":null,"transcriptFile":"EP21.txt"}],"timeline":[{"year":"2015","event":"炬識科技成立,主打 Big Data(Anna 第三次創業,資安背景)","arc":"公司轉型","episodes":[1]},{"year":"~2017","event":"仍是瀑布式 + 層級制管理","arc":"方法論","episodes":[1,3]},{"year":"2017–18","event":"「30 個人做 4 張報表」的醒悟,意識到流程出問題","arc":"公司轉型","episodes":[3]},{"year":"2018–19","event":"金融專案團隊「造反」→ Anna 反思管理方式","arc":"公司轉型","episodes":[3]},{"year":"2019","event":"營收 70–80% 來自固定型專案,體質待轉","arc":"公司轉型","episodes":[3]},{"year":"2020","event":"確立轉向「資料專案」方向","arc":"公司轉型","episodes":[1,3]},{"year":"2020–21","event":"正式轉型;參與催生台灣 MAD Landscape","arc":"外部生態","episodes":[4 lantir 核心。","episodes":[17]},{"term":"Metadata","category":"資料治理(Data Governance)","core":false,"definition":"描述資料的資料;Excel 表頭即 metadata。","episodes":[18,19]},{"term":"數位孿生 Digital Twin","category":"資料治理(Data Governance)","core":false,"definition":"由 IT 定義會「凍結時間」而失敗,動態場景才適合。","episodes":[17]},{"term":"DMBOK / CDMP / DAMA / ISO 8000 / ISO 27001","category":"資料治理(Data Governance)","core":false,"definition":"資料管理知識體系與相關標準/認證。","episodes":[6]},{"term":"DIKW","category":"資料治理(Data Governance)","core":true,"definition":"Data→Information→Knowledge→Wisdom 的階梯。","episodes":[6,18]},{"term":"敏捷(經驗主義)vs 瀑布(理性主義)","category":"方法論 / 敏捷(Methodology / Agile)","core":true,"definition":"兩者哲學不同、不能混用。","episodes":[1,3]},{"term":"Scrum 353 / Sprint / Retro / Ritual","category":"方法論 / 敏捷(Methodology / Agile)","core":false,"definition":"Scrum 框架與兩週衝刺、回顧、儀式。","episodes":[8]},{"term":"WBS / MVP / User Story / PO vs PM","category":"方法論 / 敏捷(Methodology / Agile)","core":false,"definition":"工作分解、最小可行、使用者故事、角色分工。","episodes":[2,8]},{"term":"given-when-then","category":"方法論 / 敏捷(Methodology / Agile)","core":false,"definition":"行為規格的描述句式。","episodes":[19]},{"term":"Proven Solver / Wardley Map","category":"方法論 / 敏捷(Methodology / Agile)","core":false,"definition":"已驗證的解題者、地勢圖。","episodes":[13]},{"term":"共識決 vs 主管決","category":"方法論 / 敏捷(Methodology / Agile)","core":true,"definition":"資料專案技術相依,共識決是「勝利方程式」。","episodes":[20]},{"term":"紅隊 / 藍隊 / 紫隊 / 滲透測試 / 攻擊模擬 BAS","category":"方法論 / 敏捷(Methodology / Agile)","core":false,"definition":"資安攻防演練角色與自動化攻擊模擬(Breach and Attack Simulation)。","episodes":[21]},{"term":"三維立體組織","category":"組織 / 管理(Organization)","core":true,"definition":"HACOM(總部+BU)/ Projecting(專案)/ Communities(社群)。","episodes":[20]},{"term":"HACOM / Projecting / Communities / AM Co-create","category":"組織 / 管理(Organization)","core":false,"definition":"三維各層與跨社群準則。","episodes":[8,20]},{"term":"成本中心 vs 利潤中心","category":"組織 / 管理(Organization)","core":false,"definition":"BU 是成本中心、專案是利潤中心。","episodes":[20]},{"term":"過度溝通 / 廣播 / 允許掉封包","category":"組織 / 管理(Organization)","core":true,"definition":"over-communication、broadcast、容忍資訊遺失。","episodes":[8,20]},{"term":"湧現 / 自組織 / 複雜系統 / 耗散 / 混沌邊緣","category":"組織 / 管理(Organization)","core":true,"definition":"借物理與複雜系統看公司經營。","episodes":[18]},{"term":"利害關係人 / Data Owner / Data User","category":"組織 / 管理(Organization)","core":false,"definition":"資料專案的關鍵角色。","episodes":[1,5]},{"term":"員工體驗 / Talent Success / 新手村・拉普達・黑美","category":"組織 / 管理(Organization)","core":false,"definition":"HR 產品化的概念與三個產品。","episodes":[14]},{"term":"可預測性(Google 研究)/ 主管多重角色","category":"組織 / 管理(Organization)","core":false,"definition":"mentor/coach/supervisor/tutor/peer。","episodes":[20]},{"term":"降本增效","category":"組織 / 管理(Organization)","core":false,"definition":"常見的專案目標語彙。","episodes":[5]},{"term":"DevOps / DataOps / MLOps / BizDevOps","category":"組織 / 管理(Organization)","core":false,"definition":"各種 Ops 文化與對應社群。","episodes":[8,12]},{"term":"LLM / GenAI / RAG / Agentic / MCP","category":"AI / LLM","core":false,"definition":"生成式 AI 與代理、檢索增強、MCP 等關鍵字。","episodes":[9,17]},{"term":"MAD Landscape","category":"AI / LLM","core":false,"definition":"Machine Learning, AI & Data 生態地圖(炬識參與催生台灣版)。","episodes":[4]},{"term":"RPA / Process Mining / Task Mining / Process Intelligence","category":"AI / LLM","core":false,"definition":"流程自動化與流程智慧四件套。","episodes":[15]},{"term":"Forward Deployed Engineer(FDE)","category":"AI / LLM","core":false,"definition":"前進部署工程師,當「高頻寬感測器」。","episodes":[17]},{"term":"AI 知識 > AI 模型","category":"AI / LLM","core":false,"definition":"稀缺的是對問題的知識,不是更大的模型。","episodes":[18]},{"term":"知識密集 × 資料密集","category":"AI / LLM","core":true,"definition":"Jason 的框架——AI 最先、最強衝擊「資料密集 + 知識密集」之處(監控/log 分析、漏洞挖掘);也決定哪些工作會被取代。","episodes":[21]},{"term":"digital staff(數字化員工)/ AI Native 產品","category":"AI / LLM","core":false,"definition":"強模型廠商可直接交付會操作帳號的數位員工;2035 後 AI Native 產品取代傳統資安工具。","episodes":[21]},{"term":"魚叉式攻擊 / 社交工程(AI 強化)","category":"AI / LLM","core":false,"definition":"spear phishing 客製化、成本趨近於零,傳統攔截難以招架。","episodes":[21]},{"term":"各家大模型(Claude / Anthropic / OpenAI / Llama / DeepSeek)","category":"AI / LLM","core":false,"definition":"作為「分析/演算法」供應者重洗資安 SaaS 版圖;Claude 找出專家未發現的重大漏洞。","episodes":[21]},{"term":"反洗錢 AML","category":"市場 / 商業(Market & Business)","core":false,"definition":"金融場景常見題目,適合本體論驅動。","episodes":[5,17]},{"term":"精準行銷","category":"市場 / 商業(Market & Business)","core":false,"definition":"零售/行銷類資料應用。","episodes":[5]},{"term":"時速 300 vs 80","category":"市場 / 商業(Market & Business)","core":true,"definition":"矽谷 vs 台灣的節奏對照。","episodes":[4,7,16]},{"term":"新舊世界的橋樑","category":"市場 / 商業(Market & Business)","core":true,"definition":"把舊系統/流程接到新世界。","episodes":[10,15]},{"term":"Data Mesh","category":"市場 / 商業(Market & Business)","core":false,"definition":"去中心化的資料架構主張。","episodes":[10]},{"term":"天使投資 / SPV / 獨角獸 / serial entrepreneur / exit","category":"市場 / 商業(Market & Business)","core":false,"definition":"創投生態語彙。","episodes":[16]},{"term":"人月神話 / 沒有銀彈","category":"市場 / 商業(Market & Business)","core":false,"definition":"軟體工程經典命題。","episodes":[2]},{"term":"技術交付 ≠ 客戶價值","category":"市場 / 商業(Market & Business)","core":false,"definition":"用最頂尖技術交付軟體 ≠ 完成客戶價值;要接到企業日常與承辦人的真實問題。","episodes":[21]},{"term":"SaaS 紅利 / 價值鏈洗牌 / 夾心 Mediator","category":"市場 / 商業(Market & Business)","core":true,"definition":"公有雲上少有壓倒性成功的 SaaS,紅利未盡又被 AI 攪局;SaaS 業者上依附模型廠商、下被客戶的資料知識卡住,變「不上不下」。","episodes":[21]},{"term":"場景知識 / 商業邏輯=護城河","category":"市場 / 商業(Market & Business)","core":true,"definition":"客戶難交出的產業潛規則、法規/文化差異、人際關係,將是產品/顧問公司的護城河;深耕特定產業的整合/顧問公司更有價值。","episodes":[21]},{"term":"顧問 + 交付同隊(Accenture vs Palantir)","category":"市場 / 商業(Market & Business)","core":false,"definition":"顧問出身=Accenture、軟體出身=Palantir;特定產業顧問 + IT 技術要在同一隊,呼應 EP17。","episodes":[21]},{"term":"軟法 vs 硬法 / SECURITY ACTION / SCS","category":"市場 / 商業(Market & Business)","core":false,"definition":"日本以軟法 + 補助誘因 + 供應鏈標準把資安廣撒到中小企業;歐盟硬法保護消費者、美國輸出國不自限。","episodes":[21]},{"term":"靈媒 / 鬼故事 / 考古","category":"比喻語彙(Metaphors,本系列的招牌)","core":true,"definition":"資料靈媒、把溝通落差的荒謬當鬼故事、挖歷史資料像考古。","episodes":[1]},{"term":"廚房宇宙","category":"比喻語彙(Metaphors,本系列的招牌)","core":true,"definition":"廚房/食譜/冰箱/菜園/便利商店 vs 私廚;果汁→蔬果汁→甘蔗→川菜的需求膨脹。","episodes":[1,2,4,5,19]},{"term":"以軟體為設備的製造業 / 批次 / 良率","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"資料服務的產線比喻。","episodes":[19]},{"term":"像在開鋼彈","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"大規模下自動化是生存必需。","episodes":[18]},{"term":"演唱會的柱子","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"刻意阻礙反而加速疏散(降低渦流)。","episodes":[18]},{"term":"造車 vs 當馬 / 造路的人","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"自組織下老闆的角色轉變。","episodes":[18]},{"term":"時間的靈媒 vs 資料的靈媒","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"UiPath 對照炬識。","episodes":[15]},{"term":"水電工最安全 / 遠古地球天天火山爆發 / 白牌變品牌 / 念不出名字的伏地魔公司","category":"比喻語彙(Metaphors,本系列的招牌)","core":false,"definition":"EP21 的招牌比喻——沒有 data 進出的工作難被取代、版圖劇變、上游模型廠把白牌變品牌、難念的公司名。","episodes":[21]}]}</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById('data').textContent);
const EPS = DATA.episodes, BY_ID = {}; EPS.forEach(e=>BY_ID[e.id]=e);
const TYPE_LABEL = DATA.typeLabels;
const TYPE_ORDER = ["founding","community","product","external","people"];
const TYPE_VAR = {founding:"--t-founding",community:"--t-community",product:"--t-product",external:"--t-external",people:"--t-people"};
const ARC_VAR = {"公司轉型":"--a-transform","方法論":"--a-method","產品":"--a-product","外部生態":"--a-ecosystem"};
const VIEWS = [["episodes","逐集"],["calendar","日曆"],["timeline","故事線"],["roles","人物"],["glossary","詞彙"],["about","關於"]];

const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const typeVarOf = t => TYPE_VAR[t]||"--eye";
const arcVarOf = a => { for(const k in ARC_VAR){ if(a&&a.indexOf(k)>=0) return ARC_VAR[k]; } return "--eye"; };
function epLinks(ids){ return (ids||[]).map(n=>`<a href="#/ep/${n}">EP${n}</a>`).join(""); }

/* ---------- tabs / theme ---------- */
const tabsEl = document.getElementById('tabs');
VIEWS.forEach(([id,label])=>{
  const b=document.createElement('button'); b.className='tab'; b.textContent=label;
  b.dataset.view=id; b.onclick=()=>{location.hash='#/'+id;}; tabsEl.appendChild(b);
});
function setActiveTab(v){ [...tabsEl.children].forEach(b=>b.setAttribute('aria-current', String(b.dataset.view===v))); }

const SUN='<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"/></g></svg>';
const MOON='<svg viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
const themeBtn=document.getElementById('themeBtn');
function syncThemeIcon(){ themeBtn.innerHTML = document.documentElement.getAttribute('data-theme')==='dark'?SUN:MOON; }
themeBtn.onclick=()=>{ const cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',cur); try{localStorage.setItem('gx-theme',cur);}catch(e){} syncThemeIcon(); };
syncThemeIcon();

/* ---------- episodes state ---------- */
const epFilter = { types:new Set(), tags:new Set() };

function renderEpisodes(selId){
  setActiveTab('episodes');
  const showDetail = selId!=null;
  const types = TYPE_ORDER.filter(t=>EPS.some(e=>e.type===t));
  const typeChips = types.map(t=>{
    const on=epFilter.types.has(t);
    return `<button class="chip on-type" aria-pressed="${on}" style="--c:var(${typeVarOf(t)})" data-type="${t}">
      <span class="dot" style="background:var(${typeVarOf(t)})"></span>${esc(TYPE_LABEL[t]||t)}</button>`;
  }).join("");
  const tagChips = DATA.tags.map(tg=>{
    const on=epFilter.tags.has(tg);
    return `<button class="chip tag" aria-pressed="${on}" data-tag="${esc(tg)}">${esc(tg)}</button>`;
  }).join("");
  const any = epFilter.types.size||epFilter.tags.size;

  const list = EPS.filter(e=>{
    if(epFilter.types.size && !epFilter.types.has(e.type)) return false;
    if(epFilter.tags.size){
      const ets=new Set(); e.segments.forEach(s=>s.tags.forEach(t=>ets.add(t)));
      for(const t of epFilter.tags) if(!ets.has(t)) return false;
    }
    return true;
  });

  const listHtml = list.map(e=>{
    const gs = e.guests.map(g=>g.name).join("、");
    return `<button class="epcard ${showDetail&&e.id===selId?'':''}" aria-current="${e.id===selId}" data-ep="${e.id}" style="--c:var(${typeVarOf(e.type)})">
      <div class="r1"><span class="no">EP${e.id}</span><span class="ty">${esc(TYPE_LABEL[e.type]||e.type)}</span><span class="epdate" data-epdate="${e.id}">${e.date?esc(e.date):''}</span></div>
      <div class="ti">${esc(e.title)}</div>
      <div class="gs">${gs?('來賓：'+esc(gs)):'主持單元'}</div>
    </button>`;
  }).join("") || `<div class="muted-count" style="padding:14px">沒有符合篩選的集數。</div>`;

  const detailHtml = showDetail ? episodeDetail(BY_ID[selId]) : `
    <div class="det-head"><div class="eyebrow">逐集 · 21 集</div>
    <h2>挑一集開始</h2><p class="cast">左側選一集，看它的三大重點、細部主題段落、金句與逐字稿。也可以用上方篩選或按 <b>/</b> 搜尋。</p></div>`;

  return `
  <div class="vhead">
    <div class="eyebrow">Episodes</div>
    <h1>逐集主題</h1>
    <p>21 集，每集切成細部主題段落。點標籤可跨集篩選，點關聯集可跳轉。</p>
  </div>
  <div class="filters">
    ${typeChips}<span class="sep"></span>${tagChips}
    ${any?'<button class="clr" id="clrFilter">清除篩選</button>':''}
    <span class="muted-count">${list.length} / ${EPS.length} 集</span>
  </div>
  <div class="split">
    <div class="eplist ${showDetail?'hide-m':''}">${listHtml}</div>
    <div class="epdetail ${showDetail?'':'hide-m'}">
      ${showDetail?'<a class="chip back-m" href="#/episodes">← 返回列表</a>':''}
      ${detailHtml}
    </div>
  </div>`;
}

function episodeDetail(e){
  if(!e) return '<p>找不到這一集。</p>';
  const tv = typeVarOf(e.type);
  const cast = `<span class="host"><b>${esc(e.host||'Anna')}</b></span>` +

/* ---------- transcript loading ---------- */
const txCache = {};
async function loadTranscript(id, highlight){
  const body = document.getElementById('txbody-'+id);
  if(!body) return;
  try{
    if(!txCache[id]){
      const r = await fetch('transcripts/'+BY_ID[id].transcriptFile);
      if(!r.ok) throw new Error('http '+r.status);
      txCache[id] = await r.text();
    }
    body.innerHTML = renderTranscript(txCache[id], highlight);
    if(highlight){ const mk=body.querySelector('mark'); if(mk) mk.scrollIntoView({block:'center'}); }
  }catch(err){
    body.innerHTML = '<div class="tx-note">這集逐字稿載入失敗（'+esc(err.message)+'）。<br>如果是在本機直接以檔案開啟，瀏覽器會阻擋讀取；請改用網址（http）瀏覽，部署到 GitHub Pages 後即可正常載入。</div>';
  }
}
function renderTranscript(text, hl){
  let safe = esc(text);
  // mark speaker labels
  safe = safe.replace(/(講者\s*\d+\s*[:：])/g,'<span class="st">$1</span>');
  if(hl){
    const q = esc(hl).trim();
    if(q){ try{ const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'); safe = safe.replace(re,m=>'<mark>'+m+'</mark>'); }catch(e){} }
  }
  return safe;
}

/* ---------- calendar (broadcast dates) ---------- */
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function parseEpDate(s){ const m=/^(\d{4})\.(\d{2})\.(\d{2})$/.exec(s||''); return m?{y:+m[1],mo:+m[2],d:+m[3]}:null; }
function renderCalendar(){
  setActiveTab('calendar');
  const dated = EPS.map(e=>({e,dt:parseEpDate(e.date)})).filter(x=>x.dt);
  const head = `<div class="vhead"><div class="eyebrow">Calendar</div><h1>播出日曆</h1>
    <p>依 Firstory RSS 的播出日期排列，每一格可點進該集。日期讀自 <code style="font-family:var(--mono)">episode_dates.json</code> 或 <code style="font-family:var(--mono)">feed.xml</code>／RSS。</p></div>`;
  if(!dated.length){
    return head + `<div class="cal-empty">
      還沒有日期可顯示。<br>把 Colab 產生的 <code>feed.xml</code> 或 <code>episode_dates.json</code> 放到網站根目錄（與 <code>index.html</code> 同層），日曆就會自動填上每集的播出日。<br>
      （線上 RSS 若允許跨網域，網頁也會嘗試直接抓取。）</div>`;
  }
  // group by year-month
  const months = {};
  dated.forEach(({e,dt})=>{ const k=dt.y*100+dt.mo; (months[k]=months[k]||[]).push({e,dt}); });
  const keys = Object.keys(months).map(Number).sort((a,b)=>a-b);
  const first=keys[0], last=keys[keys.length-1];
  const fy=Math.floor(first/100), fm=first%100, ly=Math.floor(last/100), lm=last%100;
  // build a continuous month sequence so gaps show as empty months
  const seq=[]; let y=fy,mo=fm;
  while(y*100+mo<=last){ seq.push(y*100+mo); mo++; if(mo>12){mo=1;y++;} if(seq.length>240)break; }
  const dow=['日','一','二','三','四','五','六'];
  const monthsHtml = seq.map(k=>{
    const Y=Math.floor(k/100), Mo=k%100;
    const epsIn = months[k]||[];
    const byDay={}; epsIn.forEach(({e,dt})=>{ (byDay[dt.d]=byDay[dt.d]||[]).push(e); });
    const firstDow = new Date(Y, Mo-1, 1).getDay();
    const daysInMonth = new Date(Y, Mo, 0).getDate();
    let cells='';
    for(let i=0;i<firstDow;i++) cells+=`<div class="cal-day pad"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const list=byDay[d];
      if(list&&list.length){
        const e0=list[0];
        cells+=`<div class="cal-day has"><a href="#/ep/${e0.id}" title="${esc(e0.title)}">
          <span class="cd-d">${d}</span><span class="cd-e">EP${e0.id}</span></a>
          ${list.length>1?`<span class="multi">+${list.length-1}</span>`:''}</div>`;
      } else {
        cells+=`<div class="cal-day"><span class="cd-d" style="color:var(--dimmer)">${d}</span></div>`;
      }
    }
    return `<div class="cal-month">
      <h3>${Y} 年 ${MONTH_NAMES[Mo-1]}<span class="cm-n">${epsIn.length?epsIn.length+' 集':''}</span></h3>
      <div class="cal-dow">${dow.map(x=>`<span>${x}</span>`).join("")}</div>
      <div class="cal-days">${cells}</div>
    </div>`;
  }).join("");
  const summary = `<div class="cal-summary">
    <span class="pill">${dated.length} / ${EPS.length} 集有日期</span>
    <span class="pill">${fy}.${String(fm).padStart(2,'0')} – ${ly}.${String(lm).padStart(2,'0')}</span>
    ${dated.length<EPS.length?`<span style="color:var(--dimmer);font-size:12px">（其餘集數待日期載入）</span>`:''}
  </div>`;
  return head + summary + `<div class="cal-grid">${monthsHtml}</div>`;
}

/* ---------- router ---------- */
const view = document.getElementById('view');
function render(){
  const h = location.hash || '#/episodes';
  const m = h.match(/^#\/ep\/(\d+)/);
  let html, openTxId=null;
  if(m){ const id=+m[1]; html=renderEpisodes(id); openTxId=id; }
  else if(h.startsWith('#/calendar')) html=renderCalendar();
  else if(h.startsWith('#/timeline')) html=renderTimeline();
  else if(h.startsWith('#/roles')) html=renderRoles();
  else if(h.startsWith('#/glossary')) html=renderGlossary();
  else if(h.startsWith('#/about')) html=renderAbout();
  else html=renderEpisodes(null);
  view.innerHTML = html;
  window.scrollTo({top:0,behavior:'instant' in window?'instant':'auto'});
  bindView();
  if(openTxId!=null){
    const det=document.getElementById('tx-'+openTxId);
    if(det && PENDING_HL){ det.open=true; loadTranscript(openTxId, PENDING_HL); PENDING_HL=null; }
  }
}
let PENDING_HL=null;

function bindView(){
  // episode list cards
  view.querySelectorAll('.epcard').forEach(b=>b.onclick=()=>{location.hash='#/ep/'+b.dataset.ep;});
  // type chips
  view.querySelectorAll('.chip.on-type').forEach(c=>c.onclick=()=>{
    const t=c.dataset.type; epFilter.types.has(t)?epFilter.types.delete(t):epFilter.types.add(t);
    view.innerHTML=renderEpisodes(null); bindView();
  });
  // tag chips (filter view)
  view.querySelectorAll('.chip.tag').forEach(c=>c.onclick=()=>{
    const t=c.dataset.tag; epFilter.tags.has(t)?epFilter.tags.delete(t):epFilter.tags.add(t);
    view.innerHTML=renderEpisodes(null); bindView();
  });
  const clr=document.getElementById('clrFilter'); if(clr) clr.onclick=()=>{epFilter.types.clear();epFilter.tags.clear();view.innerHTML=renderEpisodes(null);bindView();};
  // tags inside a segment -> go to filtered episodes
  view.querySelectorAll('.tg[data-gotag]').forEach(t=>t.onclick=()=>{
    epFilter.types.clear(); epFilter.tags=new Set([t.dataset.gotag]); location.hash='#/episodes';
  });
  // glossary category chips
  view.querySelectorAll('.chip[data-cat]').forEach(c=>c.onclick=()=>{glCat=c.dataset.cat;view.innerHTML=renderGlossary();bindView();});
  // transcript expand
  view.querySelectorAll('details.tx').forEach(d=>{
    const id=+d.id.split('-')[1];
    d.addEventListener('toggle',()=>{ if(d.open && !txCache[id]) loadTranscript(id,null); },{once:false});
  });
}

  INDEX=[];
  EPS.forEach(e=>{
    INDEX.push({kind:'集',ep:e.id,title:`EP${e.id}・${e.title}`,sub:TYPE_LABEL[e.type]||e.type,text:e.title+' '+(e.keyPoints||[]).join(' '),hash:`#/ep/${e.id}`});
    e.segments.forEach(s=>INDEX.push({kind:'段落',ep:e.id,title:s.label,sub:`EP${e.id}・${e.title}`,text:s.label+' '+s.summary+' '+s.tags.join(' '),hash:`#/ep/${e.id}`}));
    (e.metaphors||[]).forEach(mn=>INDEX.push({kind:'金句',ep:e.id,title:mn,sub:`EP${e.id}・${e.title}`,text:mn,hash:`#/ep/${e.id}`}));
  });
  DATA.glossary.forEach(g=>INDEX.push({kind:'詞彙',title:g.term,sub:g.category.replace(/（.*?）/,''),text:g.term+' '+g.definition,hash:`#/glossary`}));
  DATA.roles.forEach(r=>INDEX.push({kind:'人物',title:r.name,sub:r.title,text:r.name+' '+r.title+' '+(r.detail||'')+' '+(r.org||''),hash:`#/roles`}));
}
buildBaseIndex();

async function ensureTranscripts(){
  if(txReady||txLoading) return;
  txLoading=true; updateStatus();
  const jobs = EPS.map(async e=>{
    try{ if(!txCache[e.id]){ const r=await fetch('transcripts/'+e.transcriptFile); if(r.ok) txCache[e.id]=await r.text(); } }catch(err){}
    if(txCache[e.id]) INDEX.push({kind:'逐字稿',ep:e.id,title:`EP${e.id} 逐字稿`,sub:e.title,text:txCache[e.id],hash:`#/ep/${e.id}`,isTx:true});
  });
  await Promise.all(jobs);
  txReady=true; txLoading=false; updateStatus();
  if(overlay.classList.contains('open')) doSearch(sq.value);
}
function updateStatus(){
  if(txLoading) soStatus.innerHTML='<span class="spin"></span> 逐字稿索引建置中…（完成後即可搜尋全文）';
  else if(txReady) soStatus.innerHTML='已索引 '+EPS.length+' 集逐字稿 · 全站搜尋已就緒';
  else soStatus.textContent='輸入關鍵字即時搜尋 · 逐字稿索引將於開啟後背景建立';
}

function snippet(text,q){
  const i=text.toLowerCase().indexOf(q.toLowerCase()); if(i<0) return esc(text.slice(0,90));
  const s=Math.max(0,i-30), pre=(s>0?'…':''); const seg=text.slice(s,i+q.length+50);
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return pre+esc(seg).replace(re,m=>'<mark>'+m+'</mark>')+'…';
}
function hl(t,q){ if(!q) return esc(t); const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'); return esc(t).replace(re,m=>'<mark>'+m+'</mark>'); }

function doSearch(q){
  q=(q||'').trim(); activeIdx=-1;
  if(!q){ soRes.innerHTML=`<div class="so-empty">輸入關鍵字，搜尋 ${EPS.length} 集的重點、段落、詞彙、人物與逐字稿。</div>`; curResults=[]; return; }
  const ql=q.toLowerCase();
  const hits=INDEX.filter(r=>r.text.toLowerCase().indexOf(ql)>=0);
  const order={'集':0,'段落':1,'金句':2,'詞彙':3,'人物':4,'逐字稿':5};
  hits.sort((a,b)=>(order[a.kind]-order[b.kind]));
  const capped=hits.slice(0,60); curResults=capped;
  if(!capped.length){ soRes.innerHTML=`<div class="so-empty">沒有符合「${esc(q)}」的結果。${txReady?'':'<br><span class="tagk">（逐字稿索引仍在建置中，稍候會更完整）</span>'}</div>`; return; }
  let html='', last=null;
  capped.forEach((r,idx)=>{
    if(r.kind!==last){ html+=`<div class="so-grp">${r.kind}${r.kind==='逐字稿'?' · 內文命中':''}</div>`; last=r.kind; }
    const sub = r.isTx ? snippet(r.text,q) : esc(r.sub||'');
    html+=`<button class="so-item" data-idx="${idx}"><div class="t">${hl(r.title,q)}</div><div class="m">${sub}</div></button>`;
  });
  soRes.innerHTML=html;
  soRes.querySelectorAll('.so-item').forEach(b=>b.onclick=()=>gotoResult(+b.dataset.idx));
}
function gotoResult(idx){
  const r=curResults[idx]; if(!r) return;
  closeSearch();
  if(r.isTx) PENDING_HL=sq.value.trim();
  if(location.hash===r.hash){ render(); } else { location.hash=r.hash; }
}

function openSearch(){ overlay.classList.add('open'); updateStatus(); sq.value=''; doSearch(''); setTimeout(()=>sq.focus(),30); ensureTranscripts(); }
function closeSearch(){ overlay.classList.remove('open'); }
document.getElementById('openSearch').onclick=openSearch;
document.getElementById('soBg').onclick=closeSearch;
sq.addEventListener('input',()=>doSearch(sq.value));
sq.addEventListener('keydown',e=>{
  const items=[...soRes.querySelectorAll('.so-item')];
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(items.length-1,activeIdx+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(0,activeIdx-1);}
  else if(e.key==='Enter'){ if(activeIdx>=0&&items[activeIdx]) items[activeIdx].click(); else if(items[0]) items[0].click(); return;}
  else if(e.key==='Escape'){closeSearch();return;}
  else return;
  items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
  if(items[activeIdx]) items[activeIdx].scrollIntoView({block:'nearest'});
});
document.addEventListener('keydown',e=>{
  if(e.key==='/' && !overlay.classList.contains('open') && !/input|textarea/i.test((e.target.tagName||''))){ e.preventDefault(); openSearch(); }
  else if(e.key==='Escape' && overlay.classList.contains('open')){ closeSearch(); }
});

/* ---------- episode dates from RSS ---------- */
function fmtDate(d){ const y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),day=('0'+d.getDate()).slice(-2); return y+'.'+m+'.'+day; }
function epNumFromTitle(t){ let m=t.match(/EP\s*0*(\d+)/i)||t.match(/第\s*0*(\d+)\s*集/)||t.match(/#\s*0*(\d+)/); return m?+m[1]:null; }
function applyDate(id,str){ if(BY_ID[id]) BY_ID[id].date=str; document.querySelectorAll('[data-epdate="'+id+'"]').forEach(el=>{el.textContent=str;}); }
function afterDates(){ if((location.hash||'').startsWith('#/calendar')) render(); }
async function loadEpisodeDates(){
  // 1) episode_dates.json — 精確對照（Colab Cell 6 產出），EP 編號＝key
  try{
    const r=await fetch('episode_dates.json');
    if(r.ok){ const m=await r.json(); let hit=0;
      Object.keys(m).forEach(k=>{ const id=+k; if(BY_ID[id]&&m[k]){ applyDate(id,String(m[k])); hit++; } });
      if(hit){ afterDates(); return; } }
  }catch(e){ /* 沒有就往下試 */ }
  // 2) feed.xml（同源）→ 3) 線上 RSS（可能被 CORS 擋）
  if(typeof DOMParser==='undefined'||typeof fetch==='undefined') return;
  const urls=['feed.xml', DATA.show && DATA.show.rss].filter(Boolean);
  for(const u of urls){
    try{
      const r=await fetch(u); if(!r.ok) continue;
      const xml=await r.text();
      const doc=new DOMParser().parseFromString(xml,'application/xml');
      if(doc.querySelector('parsererror')) continue;
      const items=doc.querySelectorAll('item'); if(!items.length) continue;
      let hit=0;
      items.forEach(it=>{
        const tEl=it.querySelector('title'), pEl=it.querySelector('pubDate');
        const title=tEl?tEl.textContent:'', pd=pEl?pEl.textContent:'';
        const id=epNumFromTitle(title||''); if(id==null) return;
        const d=new Date(pd);
        if(BY_ID[id] && !isNaN(d.getTime())){ applyDate(id, fmtDate(d)); hit++; }
      });
      if(hit){ afterDates(); return; }
    }catch(e){ /* CORS / 網路 — 試下一個來源，靜默失敗 */ }
  }
}

/* ---------- go ---------- */
render();
loadEpisodeDates();
</script>
